<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Geografía e Historia · Evaluación y Corrector de Exámenes</title>
<meta name="theme-color" content="#0a1120">
<!-- Ajustes para usarla como app desde la pantalla de inicio en iPad/iPhone (Safari > Compartir > Añadir a pantalla de inicio) -->
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Eval. y Corrector">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icons/icon-180.png">
<link rel="icon" type="image/png" sizes="192x192" href="icons/icon-192.png">
<link rel="icon" type="image/png" sizes="32x32" href="icons/icon-32.png">
<script>
// Hace que la app siga funcionando sin conexión tras la primera visita con wifi.
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => { navigator.serviceWorker.register('./sw.js').catch(()=>{}); });
}
</script>
<style>
  /* ==================================================================
     TEMA "INSTRUMENTO CARTOGRÁFICO"
     Navy profundo + latón antiguo, con cristal esmerilado (liquid glass)
     en cabecera/modales y una retícula de mapa como marca de fondo.
     La marca (navy + oro) es constante en claro/oscuro; la superficie
     de contenido se adapta. Mismos selectores que el tema anterior:
     solo cambian valores y se añaden un puñado de reglas de cristal.
     ================================================================== */
  :root{
    /* Marca — constante, es el "chasis" del instrumento */
    --brand-1:#0a1120; --brand-2:#152a44; --brand-3:#25456b;
    --accent:#d7b463; --accent-2:#b3893a; --accent-ink:#1c1408;
    --accent-soft:rgba(183,137,58,.12);

    /* Superficie de contenido — tema claro ("papel de día") */
    --ink:#141b28; --mut:#5b6b82; --paper:#eef1f6; --card:#ffffff;
    --line:#dde3ec; --danger:#c62839; --danger-soft:#fdeceb;
    --warning:#a3620a; --warning-soft:#fdf1de; --warning-ink:#5c3a08;
    --surface:#f3f6fa; --surface-2:#e8edf4; --border-soft:rgba(20,27,40,.08); --muted-border:#c7d1de;
    --gpill-on-1:var(--brand-1); --gpill-on-2:var(--brand-3); --overlay-hover:rgba(10,17,32,.08);
    --glass-bg:rgba(255,255,255,.58); --glass-border:rgba(255,255,255,.6); --glass-blur:18px;

    --font-serif:system-ui,-apple-system,"Segoe UI",Roboto,sans-serif;
    --shadow-sm:0 1px 2px rgba(10,17,32,.05),0 1px 3px rgba(10,17,32,.07);
    --shadow-md:0 6px 16px -4px rgba(10,17,32,.12),0 3px 6px -2px rgba(10,17,32,.06);
    --shadow-lg:0 20px 40px -8px rgba(10,17,32,.20),0 6px 12px -4px rgba(10,17,32,.10);
    --shadow-glow:0 8px 28px -6px rgba(183,137,58,.35);
  }
  body[data-tema="oscuro"]{
    --ink:#eef1f2; --mut:#8d97ab; --paper:#0a0e16; --card:#121a27;
    --line:#232f42; --danger:#f0707f; --danger-soft:#3a1a20;
    --warning:#e2ac57; --warning-soft:#3a2a10; --warning-ink:#f6dea3;
    --surface:#141d2c; --surface-2:#1a2537; --border-soft:#232f42; --muted-border:#37455c;
    --gpill-on-1:var(--accent); --gpill-on-2:var(--accent-2); --overlay-hover:rgba(255,255,255,.10);
    --glass-bg:rgba(16,23,36,.62); --glass-border:rgba(255,255,255,.08); --glass-blur:22px;
    --shadow-sm:0 1px 2px rgba(0,0,0,.35),0 1px 3px rgba(0,0,0,.3);
    --shadow-md:0 6px 16px -4px rgba(0,0,0,.4),0 3px 6px -2px rgba(0,0,0,.3);
    --shadow-lg:0 24px 48px -10px rgba(0,0,0,.55),0 8px 16px -6px rgba(0,0,0,.4);
    --shadow-glow:0 8px 32px -4px rgba(215,180,99,.22);
  }
  body[data-tema="oscuro"] .in:focus{ background:var(--card) !important; }

  /* Versión iPad (por defecto, 1100px) / escritorio (casi todo el ancho de
     la ventana, con un margen pequeño y proporcional a cada lado). Preferencia
     del dispositivo — no viaja con las copias de seguridad. */
  body[data-ancho="escritorio"]{ --content-max: calc(100vw - 64px); }
  @media(max-width:760px){ body[data-ancho="escritorio"]{ --content-max: calc(100vw - 32px); } }
  body[data-ancho="escritorio"] .hero-tag{ max-width:760px !important; }

  *{box-sizing:border-box}
  html,body{margin:0}
  body{background:
      radial-gradient(1100px 620px at 100% -8%, rgba(183,137,58,.10), transparent 60%),
      radial-gradient(900px 500px at -10% 0%, rgba(37,69,107,.14), transparent 55%),
      var(--paper);
    color:var(--ink);
    font-family:system-ui,-apple-system,"Segoe UI",Roboto,sans-serif;
    -webkit-text-size-adjust:100%}
  header{background:linear-gradient(120deg,var(--brand-1) 0%,var(--brand-2) 55%,var(--brand-3) 100%);
    border-bottom:1px solid rgba(215,180,99,.18);
    position:sticky;top:0;z-index:5;box-shadow:var(--shadow-md);
    backdrop-filter:blur(var(--glass-blur)) saturate(140%);-webkit-backdrop-filter:blur(var(--glass-blur)) saturate(140%)}
  header h1{color:#f4ecd8;letter-spacing:-.02em}
  header .ghost{color:rgba(244,236,216,.92);border-radius:10px}
  header .ghost:hover{background:rgba(215,180,99,.16)}
  header .badge{color:rgba(244,236,216,.85);border-color:rgba(215,180,99,.35);background:rgba(215,180,99,.08)}
  header .in{border:none;box-shadow:var(--shadow-sm)}
  header label.file{color:rgba(244,236,216,.92)}
  .wrap{max-width:var(--content-max,1100px);margin:0 auto;padding:14px max(20px, env(safe-area-inset-right)) 14px max(20px, env(safe-area-inset-left))}
  h1{margin:0;font-size:19px;font-weight:800;letter-spacing:-.02em;font-family:var(--font-serif)}
  h2{margin:0 0 4px;font-size:17px;font-weight:800;letter-spacing:-.015em}
  .sub{margin:0 0 16px;color:var(--mut);font-size:13.5px;line-height:1.55}
  main{max-width:var(--content-max,1100px);margin:0 auto;padding:20px max(20px, env(safe-area-inset-right)) max(24px, env(safe-area-inset-bottom)) max(20px, env(safe-area-inset-left));display:grid;gap:16px}
  .card{background:var(--card);border:1px solid var(--border-soft);border-radius:18px;padding:18px;box-shadow:var(--shadow-sm)}
  button{font-family:inherit;cursor:pointer}
  input,select,textarea{font-family:inherit;font-size:16px}
  button,.chip,.tab,.gpill,.gpillx,label.file,input,select,a{-webkit-tap-highlight-color:transparent;touch-action:manipulation}
  @media (pointer:coarse){
    button,.tab,.chip,.gpill,label.file,.critlink,.ghost{min-height:40px}
    .btn{min-height:44px;padding-top:11px;padding-bottom:11px}
    .ghost{display:inline-flex;align-items:center}
    select,input[type=number],input[type=text]{min-height:40px}
    input[type=checkbox]{width:22px;height:22px}
    .btn.small,.ghost.small{min-height:34px}
    .gpillx{width:34px;height:34px;font-size:18px}
  }
  input[type=checkbox]{width:18px;height:18px;accent-color:var(--accent-2)}
  .in{padding:9px 12px;border-radius:11px;border:1px solid var(--line);background:var(--surface);color:var(--ink);transition:border-color .15s, box-shadow .15s, background .15s}
  /* Safari (iPad/iPhone) calcula el ancho del input de fecha con su propia UI
     interna (icono + selectores), ignorando el ancho fijado por CSS, y en
     un .grid/.flex el min-width:auto por defecto agrava el problema. */
  input[type="date"].in{min-width:0;max-width:100%;-webkit-appearance:none;appearance:none;overflow:hidden;min-height:38px}
  .grid input[type="date"],.flex input[type="date"]{min-width:0}
  .in:focus{outline:none;border-color:var(--accent-2);background:var(--card);box-shadow:0 0 0 3px var(--accent-soft)}
  .tab{padding:8px 16px;border-radius:999px;border:1px solid transparent;background:var(--surface-2);color:var(--mut);font-size:13.5px;font-weight:700;letter-spacing:-.005em;transition:.15s}
  .tab:hover{background:var(--line)}
  .tab.on{background:linear-gradient(135deg,var(--accent) 0%,var(--accent-2) 100%);border-color:transparent;color:var(--accent-ink);box-shadow:var(--shadow-glow)}
  .btn{background:linear-gradient(135deg,var(--accent) 0%,var(--accent-2) 100%);color:var(--accent-ink);border:none;border-radius:12px;font-weight:800;letter-spacing:-.005em;padding:9px 18px;font-size:14px;box-shadow:0 1px 2px rgba(10,17,32,.15),var(--shadow-glow);transition:transform .1s, box-shadow .15s, filter .15s}
  .btn:hover:not(:disabled){filter:brightness(1.05);box-shadow:0 2px 4px rgba(10,17,32,.15),0 10px 26px -4px rgba(183,137,58,.4)}
  .btn:active:not(:disabled){transform:scale(.97)}
  .btn:disabled{background:var(--muted-border);color:var(--mut);box-shadow:none;cursor:default}
  .btn.danger{background:linear-gradient(135deg,#e0596b,var(--danger));color:#fff;box-shadow:0 1px 2px rgba(10,17,32,.15),0 8px 22px -4px rgba(198,40,57,.4)}
  .btn.small{padding:5px 12px;font-size:12.5px;border-radius:9px}
  .ghost{border:none;background:none;color:var(--mut);font-size:13px;border-radius:9px;padding:6px 10px;font-weight:600;transition:background .12s,color .12s}
  .ghost:hover{background:var(--surface-2);color:var(--ink)}
  .ghost.danger{color:var(--danger)}
  .ghost.danger:hover{background:var(--danger-soft)}
  .row{display:flex;align-items:center;gap:10px;padding:9px 12px;border:1px solid var(--line);border-radius:12px;background:var(--card)}
  .pill{display:inline-flex;align-items:center;gap:6px;padding:3px 11px;border-radius:999px;font-size:12.5px;font-weight:700}
  .chip{padding:6px 13px;border-radius:999px;border:1px solid var(--line);background:var(--card);color:var(--ink);font-size:12.5px;font-weight:600;transition:.15s}
  .chip:hover{border-color:var(--accent-2)}
  .chip.on{background:linear-gradient(135deg,var(--accent),var(--accent-2));border-color:transparent;color:var(--accent-ink);box-shadow:var(--shadow-glow)}
  .critbox{display:flex;align-items:center;gap:10px;padding:8px 11px;border:1px solid var(--line);border-radius:11px;margin-bottom:5px;background:var(--card);transition:border-color .12s,background .12s}
  .critbox:hover{border-color:var(--muted-border)}
  .critbox.sel{border-color:var(--accent-2);background:var(--accent-soft);box-shadow:inset 3px 0 0 var(--accent-2)}
  .miniw{width:62px;padding:5px 7px}
  label.file{cursor:pointer;font-weight:600}
  .big{font-size:34px;font-weight:800;line-height:1;letter-spacing:-.03em}
  .flex{display:flex;gap:10px;flex-wrap:wrap;align-items:center}
  .grid{display:grid;gap:8px}
  table{border-collapse:collapse;width:100%;font-size:13.5px}
  th,td{text-align:left;padding:9px 11px;border-bottom:1px solid var(--surface-2)}
  th{color:var(--mut);font-weight:700;font-size:11px;text-transform:uppercase;letter-spacing:.07em;border-bottom:2px solid var(--line)}
  tbody tr{transition:background .1s}
  tbody tr:hover{background:var(--surface)}
  .scroll{max-height:360px;overflow-y:auto;overflow-x:auto;-webkit-overflow-scrolling:touch;padding-right:4px}
  .grouptabs{display:flex;gap:8px;flex-wrap:wrap;align-items:center;padding:10px 20px;max-width:var(--content-max,1100px);margin:0 auto;border-bottom:none;background:transparent}
  .gpill{display:flex;align-items:center;gap:2px;padding:5px 5px 5px 14px;border-radius:999px;border:1px solid var(--line);background:var(--card);font-size:13.5px;font-weight:700;color:var(--ink);box-shadow:var(--shadow-sm);transition:.15s}
  .gpill:hover{border-color:var(--muted-border);box-shadow:var(--shadow-md)}
  .gpill.on{background:linear-gradient(135deg,var(--gpill-on-1),var(--gpill-on-2));border-color:transparent;box-shadow:var(--shadow-glow)}
  body[data-tema="oscuro"] .gpill.on{color:var(--accent-ink)}
  body:not([data-tema="oscuro"]) .gpill.on{color:#f4ecd8}
  .gpillname{cursor:pointer}
  .gpill .mat{display:block;font-size:11px;font-weight:400;color:inherit;opacity:.7}
  .gpillx{border:none;background:transparent;color:inherit;opacity:.55;font-size:15px;line-height:1;width:22px;height:22px;border-radius:50%;cursor:pointer;flex-shrink:0}
  .gpillx:hover{opacity:1;background:var(--overlay-hover);color:#fca5a5}
  .badge{font-size:11px;color:var(--mut);border:1px solid var(--line);border-radius:999px;padding:2px 9px;background:var(--surface);font-weight:600}
  .critlink{cursor:pointer;color:var(--accent-2);border-bottom:1px dotted var(--accent);font-weight:700;white-space:nowrap;padding:4px 2px;margin:-4px -2px;display:inline-block}
  .critlink:hover{opacity:.7}
  .modal-overlay{position:fixed;inset:0;background:rgba(6,10,18,.55);backdrop-filter:blur(6px);-webkit-backdrop-filter:blur(6px);display:flex;align-items:center;justify-content:center;z-index:1000;padding:20px;animation:modalFade .14s ease-out}
  @keyframes modalFade{from{opacity:0}to{opacity:1}}
  .modal-box{background:var(--glass-bg);border:1px solid var(--glass-border);backdrop-filter:blur(var(--glass-blur)) saturate(160%);-webkit-backdrop-filter:blur(var(--glass-blur)) saturate(160%);color:var(--ink);border-radius:22px;max-width:540px;width:100%;max-height:82vh;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:22px 24px;box-shadow:var(--shadow-lg)}
  .modal-close{border:none;background:none;font-size:24px;line-height:1;padding:8px 10px;margin:-8px -10px 0 0;cursor:pointer;color:var(--mut);touch-action:manipulation;border-radius:8px}
  .modal-close:hover{color:var(--ink);background:var(--surface-2)}
  .hero{background:linear-gradient(120deg,var(--brand-1) 0%,var(--brand-2) 55%,var(--brand-3) 100%);
    border-radius:26px;padding:32px 32px 26px;margin-bottom:4px;box-shadow:var(--shadow-lg);position:relative;overflow:hidden}
  .hero::before{
    content:"";position:absolute;inset:0;pointer-events:none;opacity:.5;
    background-image:
      repeating-linear-gradient(0deg, rgba(215,180,99,.09) 0 1px, transparent 1px 64px),
      repeating-linear-gradient(90deg, rgba(215,180,99,.09) 0 1px, transparent 1px 64px);
    -webkit-mask-image:radial-gradient(760px 420px at 82% 8%, #000 0%, transparent 72%);
    mask-image:radial-gradient(760px 420px at 82% 8%, #000 0%, transparent 72%);
  }
  .hero::after{content:"";position:absolute;right:-60px;top:-90px;width:280px;height:280px;border-radius:50%;
    background:radial-gradient(circle, rgba(215,180,99,.30), transparent 70%);pointer-events:none;filter:blur(2px)}
  .hero-eyebrow{font-size:11px;letter-spacing:.14em;text-transform:uppercase;color:var(--accent);margin-bottom:10px;font-weight:800}
  .hero-title{font-family:var(--font-serif);font-size:35px;font-weight:800;margin:0 0 10px;letter-spacing:-.035em;color:#f7f2e4}
  .hero-tag{font-size:15px;color:rgba(247,242,228,.86);margin:0 0 8px;max-width:540px;line-height:1.55;position:relative}
  .hero .btn{background:linear-gradient(135deg,#f7f2e4,#e9dcb8);color:var(--brand-1);box-shadow:0 6px 20px rgba(0,0,0,.25);margin-top:10px}
  .hero .btn:hover:not(:disabled){filter:none;background:linear-gradient(135deg,#fffaf0,#f2e6c4)}
  .timeline{display:flex;align-items:center;max-width:480px;margin:0 0 38px}
  .timeline .seg{flex:1;height:1px;background:var(--line);min-width:16px}
  .timeline .pt{display:flex;flex-direction:column;align-items:center;gap:7px;flex-shrink:0}
  .timeline .dot{width:7px;height:7px;border-radius:50%;background:var(--accent-2)}
  .timeline .lbl{font-size:11px;color:var(--mut);white-space:nowrap}
  .section-eyebrow{font-size:11.5px;letter-spacing:.09em;text-transform:uppercase;color:var(--mut);font-weight:700;margin:6px 0 2px}
  .home-seccion-header{display:flex;align-items:center;gap:7px;width:100%;background:none;border:none;padding:8px 2px;margin:4px 0 2px;cursor:pointer;text-align:left;border-radius:8px}
  .home-seccion-header:hover{background:var(--overlay-hover)}
  .home-seccion-header:hover .section-eyebrow{color:var(--accent-2)}
  .home-seccion-chevron{color:var(--accent-2);font-size:11px;width:12px;flex-shrink:0;transition:transform .15s}
  .home-seccion-header-right{justify-content:flex-end}
  .gcard-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(230px,1fr));gap:14px;margin-top:10px}
  .gcard{background:var(--card);border:1px solid var(--border-soft);border-radius:18px;padding:18px;display:flex;flex-direction:column;gap:2px;box-shadow:var(--shadow-sm);transition:transform .15s, box-shadow .15s;position:relative;overflow:hidden}
  .gcard::before{content:"";position:absolute;left:0;top:0;right:0;height:3px;background:linear-gradient(90deg,var(--accent),var(--accent-2))}
  .gcard:hover{transform:translateY(-3px);box-shadow:var(--shadow-lg)}
  .gcard-title{font-size:15px;font-weight:800;letter-spacing:-.015em}
  .gcard-meta{font-size:12.5px;color:var(--mut);margin-top:2px;line-height:1.5}
  .gcard-count{font-size:12px;color:var(--accent-2);font-weight:700;margin-top:8px}
  body[data-tema="oscuro"] .gcard-count{color:var(--accent)}
  .gcard-actions{display:flex;gap:8px;margin-top:14px}
  .alert-box{background:var(--warning-soft);border:1px solid var(--warning);border-radius:12px;padding:10px 14px;font-size:13px;color:var(--warning-ink);display:flex;gap:10px;align-items:center}
  @media(max-width:560px){ h1{font-size:17px} main{padding:14px} .hero-title{font-size:27px} .hero{padding:22px 20px 18px} }

  /* Calendario de Inicio */
  .ag-layout{display:grid;grid-template-columns:1.3fr 1fr;gap:16px;align-items:start}
  @media(max-width:760px){ .ag-layout{grid-template-columns:1fr} }
  .ag-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:4px}
  .ag-grid-head{margin-bottom:4px}
  .ag-cell-head{text-align:center;font-size:11px;font-weight:700;color:var(--mut);text-transform:uppercase;letter-spacing:.04em;padding:4px 0}
  .ag-cell{aspect-ratio:1/1;border-radius:11px;background:var(--surface);border:1px solid transparent;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;cursor:pointer;transition:.12s;position:relative}
  .ag-cell:hover{background:var(--accent-soft);border-color:var(--accent-2)}
  .ag-cell-pad{background:transparent;cursor:default;pointer-events:none}
  .ag-cell-hoy{background:linear-gradient(135deg,var(--accent),var(--accent-2));box-shadow:var(--shadow-glow)}
  .ag-cell-hoy .ag-daynum{color:var(--accent-ink);font-weight:800}
  .ag-daynum{font-size:13.5px;font-weight:700;color:var(--ink)}
  .ag-dots{display:flex;gap:2px;align-items:center}
  .ag-dot{width:5px;height:5px;border-radius:50%;display:inline-block}
  .ag-more{font-size:8.5px;color:var(--mut);font-weight:700}
  .ag-cell-hoy .ag-more{color:rgba(28,20,8,.75)}
  .ag-lista{display:flex;flex-direction:column;gap:6px;max-height:380px;overflow-y:auto;-webkit-overflow-scrolling:touch;padding-right:2px}
  .ag-evento{display:flex;gap:12px;align-items:flex-start;padding:9px 10px;border-radius:12px;border:1px solid var(--line);cursor:pointer;transition:.12s}
  .ag-evento:hover{border-color:var(--accent-2);background:var(--accent-soft)}
  .ag-evento-fecha{display:flex;flex-direction:column;align-items:center;line-height:1.1;flex-shrink:0;width:34px;padding-top:1px}
  .ag-evento-fecha span{font-size:10px;color:var(--mut);text-transform:uppercase;font-weight:700}
  .ag-evento-fecha strong{font-size:17px;font-weight:800}
  .ag-evento-titulo{font-size:13.5px;font-weight:700;margin-top:3px}
  .ag-evento-grupo{font-size:11.5px;color:var(--mut);margin-top:1px}
  .ag-hoy-chip{display:inline-flex;align-items:center;gap:7px;padding:6px 12px;border-radius:999px;border:1px solid var(--line);font-size:12.5px;font-weight:700;cursor:pointer;transition:.12s}
  .ag-hoy-chip:hover{filter:brightness(.97)}

  /* Horario semanal */
  .hor-grid{display:grid;grid-template-columns:64px repeat(5,1fr);gap:4px;font-size:11px}
  .hor-cell{border-radius:8px;padding:4px 6px;min-height:52px;display:flex;flex-direction:column;justify-content:center;overflow:hidden}
  .hor-head{background:transparent;color:var(--mut);font-weight:700;text-transform:uppercase;font-size:10.5px;letter-spacing:.04em;min-height:auto;padding:2px 4px;justify-content:flex-end;text-align:center;align-items:center}
  .hor-time{background:transparent;color:var(--mut);font-size:10px;text-align:right;justify-content:center;padding-right:8px;min-height:52px}
  .hor-slot{background:var(--surface);border:1px solid var(--line);cursor:pointer;transition:.12s;position:relative}
  .hor-copiar-btn{position:absolute;top:1px;right:1px;background:var(--card);border:1px solid var(--line);border-radius:6px;font-size:9px;line-height:1;padding:2px 3px;cursor:pointer;opacity:.55}
  .hor-copiar-btn:hover{opacity:1;border-color:var(--accent-2)}
  .hor-slot-pegar{cursor:copy;box-shadow:inset 0 0 0 2px var(--accent-2)}

cíficas (pruebas escritas u orales, trabajos individuales o en grupo, exposiciones, mapas, interpretación de fuentes…)", "peso": 50}, {"label": "Trabajo diario en clase (tareas, actividades, cuaderno de clase, participación activa)", "peso": 30}, {"label": "Hábitos de trabajo y actitud (puntualidad, respeto, esfuerzo, participación en clase)", "peso": 20}]}, "HART_2BACH": {"materia": "Historia del Arte", "curso": "2.º Bachillerato", "ces": [{"id": "CE1", "titulo": "Elaborar una definición de la obra de arte teniendo en cuenta las aportaciones realizadas por la historiografía artística", "cc": ["CC", "CCEC"], "criterios": [{"id": "1.1", "texto": "Reunir información sobre los cambios producidos en la concepción del arte en diferentes momentos históricos y en diversas culturas."}, {"id": "1.2", "texto": "Comparar las diferentes concepciones que sobre la obra de arte ha aportado la historiografía artística."}, {"id": "1.3", "texto": "Debatir sobre el concepto de arte utilizando las aportaciones más importantes realizadas por la historiografía artística e incluyendo una reflexión propia."}, {"id": "1.4", "texto": "Elaborar una definición de la obra de arte que incluya la información extraída de fuentes historiográficas, la reflexión realizada sobre esta y las conclusiones a las que se haya llegado tras el proceso de debate."}, {"id": "1.5", "texto": "Valorar y respetar la diversidad de manifestaciones artísticas tanto del pasado como del presente."}]}, {"id": "CE2", "titulo": "Identificar las diferentes funciones que la obra de arte ha ejercido a lo largo del tiempo, describirlas y compararlas realizando apreciaciones personales", "cc": ["CCEC", "CC"], "criterios": [{"id": "2.1", "texto": "Identificar en la obra de arte un medio de comunicación y de disfrute estético inherente a la condición humana."}, {"id": "2.2", "texto": "Analizar una obra de arte significativa identificando y explicando la función para la que fue creada."}, {"id": "2.3", "texto": "Relacionar la función de las obras de arte tanto con las circunstancias dominantes de la época en que fueron creadas como con la mano creadora que les dio forma."}, {"id": "2.4", "texto": "Señalar los diferentes papeles que en la actualidad puede tener la obra de arte, resaltar la diversidad de funciones que ejerce y detectar las polémicas en las que puede verse inmersa."}]}, {"id": "CE3", "titulo": "Identificar, caracterizar y comparar los principales estilos artísticos que se han sucedido a lo largo de la historia, y utilizarlos para clasificar las obras de arte más representativas a diferentes escalas", "cc": ["CCEC"], "criterios": [{"id": "3.1", "texto": "Identificar y describir los estilos más importantes de la Historia del Arte."}, {"id": "3.2", "texto": "Situar obras de arte tanto locales como globales en los estilos artísticos que las crearon y señalar sus rasgos estilísticos más importantes."}, {"id": "3.3", "texto": "Detectar algunas personalidades creadoras que fueron capaces de salirse del esquema estilístico dominante de su época y valorar el avance que supuso la obra de estas personalidades."}, {"id": "3.4", "texto": "Manifestar interés y respeto por la diversidad artística de las sociedades humanas."}]}, {"id": "CE4", "titulo": "Explicar la obra de arte interpretando correctamente el lenguaje artístico y las características estilísticas, identificando los mensajes que transmite e incluyendo en las explicaciones los conceptos fundamentales, términos y vocabulario propios de la materia", "cc": ["CCL", "CCEC"], "criterios": [{"id": "4.1", "texto": "Localizar los elementos formales, técnicos, simbólicos y estilísticos que forman parte del lenguaje artístico implícito en una obra de arte."}, {"id": "4.2", "texto": "Aplicar un método de comentario artístico que permita interpretar la obra de arte e identificar tanto los elementos intrínsecos (materiales, formas y símbolos) como los extrínsecos (mano creadora, clientela y condiciones económico-sociales)."}, {"id": "4.3", "texto": "Elaborar explicaciones de obras de arte basadas en el método de comentario artístico establecido, utilizando la terminología y el vocabulario específico de la materia y diversos formatos tanto orales como escritos."}, {"id": "4.4", "texto": "Expresar sentimientos propios ante las creaciones artísticas, respetando la diversidad de percepciones ante la obra de arte y superando estereotipos y prejuicios."}]}, {"id": "CE5", "titulo": "Identificar y explicar la obra de mujeres creadoras dentro de la Historia del Arte y visibilizar sus aportaciones más importantes", "cc": ["CC"], "criterios": [{"id": "5.1", "texto": "Identificar las obras de mujeres artistas a lo largo de la historia del arte."}, {"id": "5.2", "texto": "Realizar biografías de mujeres artistas para ser expuestas a través de escritos o producciones digitales que incluyan sus aportaciones y obras más importantes."}, {"id": "5.3", "texto": "Analizar críticamente la imagen que se ha dado de la mujer en la historia del arte mediante el análisis comparativo de obras de diferentes épocas en las que esté representada la figura femenina."}, {"id": "5.4", "texto": "Mostrar una actitud compatible con la defensa de la igualdad entre hombres y mujeres a la hora de trabajar con obras de arte."}]}, {"id": "CE6", "titulo": "Analizar el patrimonio artístico, resaltar su capacidad para conformar identidades individuales y colectivas, valorar su aportación a la cultura y reconocer su papel como elemento dinamizador de la economía", "cc": ["CCEC"], "criterios": [{"id": "6.1", "texto": "Identificar y analizar la presencia del arte en la vida cotidiana, señalar los vínculos con la realidad social y valorar su utilización como objeto de consumo."}, {"id": "6.2", "texto": "Definir las categorías de protección de los elementos artísticos más importantes que establece la legislación."}, {"id": "6.3", "texto": "Valorar el patrimonio artístico en el ámbito local y global, identificar sus características principales y participar de manera activa en la conservación del más próximo."}]}, {"id": "CE7", "titulo": "Utilizar recursos variados para extraer información y elaborar producciones personales, utilizando herramientas TIC en las que se incluya la obra de arte como objeto de estudio", "cc": ["CCL"], "criterios": [{"id": "7.1", "texto": "Utilizar fuentes de información cinematográficas, literarias, textuales (historiográficas e históricas) tanto en formato digital como tradicional para planificar los trabajos de investigación."}, {"id": "7.2", "texto": "Buscar, seleccionar y contrastar la información necesaria procedente de diferentes fuentes para poder llevar a cabo pequeñas investigaciones sobre el fenómeno artístico."}, {"id": "7.3", "texto": "Elaborar producciones propias tanto en formato tradicional como en formato digital, que expliquen el fenómeno artístico, utilizando la información seleccionada y mostrando un dominio adecuado de los conceptos artísticos."}, {"id": "7.4", "texto": "Compartir contenidos digitales utilizando herramientas en línea."}]}], "bloques": [{"label": "Exámenes y trabajos (pruebas escritas, mapas conceptuales, trabajos expuestos por el alumnado…)", "peso": 90}, {"label": "Trabajo de casa y de clase", "peso": 10}]}, "HESP_2BACH": {"materia": "Historia de España", "curso": "2.º Bachillerato", "ces": [{"id": "CE1", "titulo": "Comparar los distintos regímenes políticos de la historia española usando conceptos históricos, explicar los cambios y la continuity entre ellos identificando las causas, y reconocer su huella en el presente", "cc": ["CCL"], "criterios": [{"id": "1.1", "texto": "Construir una síntesis cronológicamente ordenada y coherente, usando los términos adecuados, sobre hechos, procesos y personajes relevantes de los distintos regímenes políticos desde el fin de la Monarquía absoluta hasta la actualidad."}, {"id": "1.2", "texto": "Elaborar juicios propios sobre la distinta relevancia de los textos constitucionales de los diferentes regímenes políticos, como garantía de los derechos y libertades de los españoles y las españolas."}, {"id": "1.3", "texto": "Aportar posibles motivos sobre el cambio, la continuidad y la causalidad, así como de la distinta relevancia otorgada a unos hechos históricos sobre otros en diferentes momentos del pasado y en el presente."}]}, {"id": "CE2", "titulo": "Buscar, identificar y seleccionar la información referente a acontecimientos y procesos históricos a partir de distintas fuentes documentales, llevando a cabo un análisis crítico de la información que proporcionan", "cc": ["CD", "CC"], "criterios": [{"id": "2.1", "texto": "Identificar la información sobre el pasado y desarrollar técnicas de crítica de las fuentes históricas, analizando su origen, fiabilidad y relevancia."}, {"id": "2.2", "texto": "Utilizar la información contenida en diferentes fuentes documentales para explicar procesos históricos y para entender su trascendencia en el mundo actual."}, {"id": "2.3", "texto": "Detectar y rechazar prejuicios o estereotipos no fundamentados en hechos y saberes, sino en opiniones que no han sido contrastadas ni obtenidas a partir de fuentes veraces."}]}, {"id": "CE3", "titulo": "Contrastar las identidades individuales con las colectivas, reconociendo la existencia de identidades múltiples en construcción que se tienen que respetar y valorar", "cc": ["CC"], "criterios": [{"id": "3.1", "texto": "Analizar el origen de las identidades regionales y nacionales que se han ido construyendo en la historia contemporánea española, reconociendo la diversidad de identidades, así como los distintos sentimientos de pertenencia y símbolos comunes."}, {"id": "3.2", "texto": "Identificar los principales procesos políticos, culturales y administrativos que han contribuido a la construcción de la nación española."}, {"id": "3.3", "texto": "Elaborar juicios propios sobre los resultados de las principales acciones llevadas a cabo por colectivos sociales o por las administraciones en el proceso de construcción de las identidades nacionales y regionales, entendiendo que es un proceso en continua estructuración."}]}, {"id": "CE4", "titulo": "Explicar la evolución de la economía española, reconociendo los progresos logrados y las limitaciones persistentes en la evolución del nivel de vida, las condiciones laborales y la cohesión social a lo largo del tiempo, así como su repercusión en la sostenibilidad, tomando en consideración las desigualdades sociales y territoriales", "cc": ["CC", "CPSAA"], "criterios": [{"id": "4.1", "texto": "Describir la evolución económica española, teniendo en cuenta la de los países de su entorno, valorando sus efectos en cuanto a la desigualdad social, desequilibrios territoriales y degradación ambiental."}, {"id": "4.2", "texto": "Elaborar juicios propios sobre el proceso de modernización económica y social en la España contemporánea, a partir del análisis de fuentes históricas y de los debates historiográficos existentes sobre el desarrollo."}, {"id": "4.3", "texto": "Contextualizar los conceptos de progreso y modernización en diferentes momentos históricos, entendiendo que son procesos de múltiples causas. Identificar las medidas adoptadas por el Estado para lograr el bienestar de la población."}]}, {"id": "CE5", "titulo": "Reconocer el origen de la diversidad ideológica de las distintas culturas políticas en la evolución histórica española", "cc": ["CC"], "criterios": [{"id": "5.1", "texto": "Explicar las causas de la conformación de las distintas culturas políticas, teniendo en cuenta la diversidad de condiciones de vida que ha dado lugar a conflictividades sociales a lo largo de la historia española."}, {"id": "5.2", "texto": "Identificar y contextualizar las principales culturas políticas, sus formas de organización y sus proyectos políticos, analizando las motivaciones que han conducido a algunos sujetos a llevar a cabo distintas acciones, así como las medidas consiguientes adoptadas por el Estado."}, {"id": "5.3", "texto": "Generar opiniones argumentadas y contrastadas sobre la función que han desarrollado las distintas ideologías en la estructura social y política de la España contemporánea."}]}, {"id": "CE6", "titulo": "Contextualizar la posición española en la historia del mundo, señalando particularidades y semejanzas de su evolución histórica y teniendo en cuenta los compromisos actuales con el europeísmo, la cooperación y la seguridad conjunta", "cc": ["CC"], "criterios": [{"id": "6.1", "texto": "Reconocer el valor geoestratégico de España en la evolución histórica contemporánea, así কাশী como su influencia en las relaciones internacionales."}, {"id": "6.2", "texto": "Identificar los principales compromisos del Estado español, tanto los derivados de su integración en la Unión Europea como los que corresponden a un país comprometido con la cooperación, la solidaridad y el ejercicio de la ciudadanía ética."}, {"id": "6.3", "texto": "Señalar los retos globales, caracterizando las singularidades y la evolución del caso español respecto a otros países europeos y sus conexiones con procesos históricos relevantes, detectando los estereotipos asociados a ellos."}]}, {"id": "CE7", "titulo": "Incorporar la perspectiva de género en el análisis histórico, promoviendo actitudes de reivindicación de la igualdad efectiva entre mujeres y hombres", "cc": ["CC"], "criterios": [{"id": "7.1", "texto": "Introducir la perspectiva de género en la observación y el análisis de la realidad histórica, recuperando figuras individuales y colectivas que hayan contribuido a la emancipación femenina y a la equiparación de derechos entre ambos géneros."}, {"id": "7.2", "texto": "Identificar los mecanismos de dominación que han generado y mantenido la desigualdad entre hombres y mujeres, los roles asignados y los espacios de actividades ocupados tradicionalmente por las mujeres."}, {"id": "7.3", "texto": "Analizar fuentes literarias y artísticas que contribuyen a entender el papel de las mujeres en la historia española."}]}, {"id": "CE8", "titulo": "Reconocer el valor del patrimonio cultural e histórico como conformador de la memoria colectiva, participando en la elaboración y difusión de propuestas que favorezcan su preservación y valoración", "cc": ["CCEC"], "criterios": [{"id": "8.1", "texto": "Identificar las características más destacadas de los elementos patrimoniales existentes en la historia contemporánea española."}, {"id": "8.2", "texto": "Realizar trabajos de investigación históricos e historiográficos que generen productos relacionados con la memoria colectiva sobre acontecimientos, personajes o elementos patrimoniales de interés."}, {"id": "8.3", "texto": "Participar en la elaboración y difusión de propuestas que favorezcan la preservación y valoración del patrimonio histórico, considerándolo un bien común que hay que proteger."}]}], "bloques": [{"label": "Exámenes y trabajos (pruebas escritas, mapas conceptuales, trabajos expuestos por el alumnado…)", "peso": 90}, {"label": "Trabajo de casa y de clase", "peso": 10}]}, "GEO_2BACH": {"materia": "Geografía", "curso": "2.º Bachillerato", "ces": [{"id": "CE1", "titulo": "Analizar mediante métodos y técnicas geográficas las principales repercusiones territoriales relativas a los retos ecosociales más importantes que afronta España, y contrastarlas con los discursos oficiales o no oficiales que las abordan, identificando patrones y hábitos de consumo insostenibles que deterioran el espacio geográfico, y defendiendo el uso social responsable de los recursos", "cc": ["CCL", "CC"], "criterios": [{"id": "1.1", "texto": "Identificar, describir y analizar mediante métodos y técnicas de la Geografía las principales repercusiones territoriales relativas a los retos ecosociales más importantes que afronta España."}, {"id": "1.2", "texto": "Contrastar los discursos oficiales y no oficiales que abordan las principales repercusiones territoriales relativas a los retos ecosociales más importantes que afronta España con el resultado de análisis geográficos."}, {"id": "1.3", "texto": "Identificar patrones y hábitos de consumo insostenibles que deterioran de manera significativa el espacio geográfico español, utilizando procedimientos y datos geográficos."}, {"id": "1.4", "texto": "Utilizar argumentos en defensa del uso social sostenible y responsable de los recursos, basándose en procedimientos y datos geográficos."}]}, {"id": "CE2", "titulo": "Explicar el espacio geográfico como sistema a partir del análisis de fuentes de información visuales, contrastando los paisajes naturales respecto de los humanizados y argumentando la necesidad de la sostenibilidad como principio ineludible en las interacciones entre los grupos humanos y el medio ambiente", "cc": ["CCL", "STEM"], "criterios": [{"id": "2.1", "texto": "Describir y explicar el espacio geográfico como sistema formado por subsistemas interrelacionados a partir del análisis de fuentes de información visuales."}, {"id": "2.2", "texto": "Identificar y comparar paisajes naturales y humanizados, indicando las principales diferencias existentes entre ambos a partir del análisis de fuentes de información visuales."}, {"id": "2.3", "texto": "Explicar las repercusiones en el espacio geográfico de la acción antrópica a partir del contraste entre paisaje humanizado y paisaje natural."}, {"id": "2.4", "texto": "Argumentar la necesidad de la sostenibilidad como principio ineludible en las interacciones entre los grupos humanos y el medio ambiente."}]}, {"id": "CE3", "titulo": "Describir la diversidad natural de España y confrontarla con el contexto europeo, a través de las características distintivas de relieve, clima, hidrografía y biodiversidad", "cc": ["CCL", "STEM"], "criterios": [{"id": "3.1", "texto": "Localizar e identificar en mapas las principales regiones naturales, geomorfológicas y bioclimáticas de España y de Europa."}, {"id": "3.2", "texto": "Describir sintéticamente la diversidad de las regiones naturales de España a través de las características más destacadas de relieve, clima, hidrografía y biodiversidad."}, {"id": "3.3", "texto": "Describir sintéticamente la diversidad natural de las principales regiones naturales de Europa a través de las características más destacadas de relieve, clima, hidrografía y biodiversidad."}, {"id": "3.4", "texto": "Confrontar las características de relieve, clima, hidrografía y biodiversidad de las regiones naturales de España con las del contexto europeo."}]}, {"id": "CE4", "titulo": "Localizar y delimitar la escala de fenómenos físicos y humanos de diferente tipo, utilizando métodos y técnicas de la Geografía, especialmente las tecnologías de la información geográfica (TIG), así como de ciencias afines, en el análisis del espacio geográfico y en propuestas de actuación territorial", "cc": ["STEM", "CD", "CE"], "criterios": [{"id": "4.1", "texto": "Localizar fenómenos físicos y humanos de diferente tipo, utilizando métodos y técnicas de la Geografía, especialmente las tecnologías de la información geográfica (TIG), y de ciencias afines."}, {"id": "4.2", "texto": "Delimitar la escala de fenómenos físicos y humanos de diferente tipo, utilizando métodos y técnicas de la Geografía, especialmente las tecnologías de la información geográfica (TIG) y de ciencias afines."}, {"id": "4.3", "texto": "Analizar el espacio utilizando métodos y técnicas de la Geografía, especialmente las tecnologías de la información geográfica (TIG), y de ciencias afines."}, {"id": "4.4", "texto": "Realizar propuestas de actuación territorial a partir del análisis del espacio realizado mediante métodos y técnicas de la Geografía, especialmente las tecnologías de la información geográfica (TIG), y de ciencias afines."}]}, {"id": "CE5", "titulo": "Elaborar y exponer trabajos que analicen las dinámicas globalizadoras que determinan las relaciones socioeconómicas y culturales mundiales y sus repercusiones en el territorio, promoviendo la dignidad humana y el respeto al medio ambiente como forma de compromiso function haceTiempo(ts){
  const diff=Date.now()-ts;
  const min=Math.floor(diff/60000);
  if(min<1) return "hace un momento";
  if(min<60) return `hace ${min} min`;
  const h=Math.floor(min/60);
  if(h<24) return `hace ${h} h`;
  const d=Math.floor(h/24);
  return `hace ${d} día${d===1?"":"s"}`;
}

function splitApellidosNombre(str){
  str=(str||"").trim();
  if(!str) return {apellidos:"",nombreP:""};
  const i=str.indexOf(",");
  if(i>=0) return {apellidos:str.slice(0,i).trim(), nombreP:str.slice(i+1).trim()};
  return {apellidos:str, nombreP:""};
}
function nombreCompleto(apellidos,nombreP){
  apellidos=(apellidos||"").trim(); nombreP=(nombreP||"").trim();
  if(apellidos && nombreP) return `${apellidos}, ${nombreP}`;
  return apellidos || nombreP || "";
}
function normalizarTexto(str){
  return String(str||"").normalize("NFD").replace(/[\u0300-\u036f]/g,"").toLowerCase().trim().replace(/\s+/g," ");
}

}

function normalizarAlumno(a){
  if(a.observaciones===undefined) a.observaciones=a.comentario||"";
  if(!Array.isArray(a.comentariosEval)) a.comentariosEval=["","",""];
  while(a.comentariosEval.length<3) a.comentariosEval.push("");
  delete a.comentario;
  if(a.apellidos===undefined || a.nombreP===undefined){
    const partes=splitApellidosNombre(a.nombre||"");
    if(a.apellidos===undefined) a.apellidos=partes.apellidos;
    if(a.nombreP===undefined) a.nombreP=partes.nombreP;
  }
  a.nombre = nombreCompleto(a.apellidos,a.nombreP) || a.nombre || "";
  if(a.nese===undefined) a.nese=false;
  if(a.neseNivel===undefined) a.neseNivel="";
  if(a.neseNivelOtro===undefined) a.neseNivelOtro = !!(a.neseNivel && !NIVELES_NESE.includes(a.neseNivel));
  if(a.plan===undefined) a.plan="";
  if(a.repetidor===undefined) a.repetidor=false;
  return a;
}

function parseCatalogoTexto(texto){
  const lines=String(texto||"").split(/\r?\n/);
  let materia="", curso="";
  const ces=[]; const bloques=[];
  let modo=null, ceActual=null;
  const errores=[];
  lines.forEach((raw,i)=>{
    const line=raw.trim(); const n=i+1;
    if(!line) return;
    if(line.startsWith("#")) return;
    let m;
    if((m=line.match(/^MATERIA\s*:\s*(.+)$/i))){ materia=m[1].trim(); modo=null; return; }
    if((m=line.match(/^CURSO\s*:\s*(.+)$/i))){ curso=m[1].trim(); modo=null; return; }
    if(/^BLOQUES\s*$/i.test(line)){ modo="bloques"; return; }
    if(modo==="bloques" && (m=line.match(/^(.+?)\s*=\s*([\d.,]+)\s*%?\s*$/))){
      bloques.push({label:m[1].trim(), peso:Number(m[2].replace(",","."))});
      return;
    }
    if((m=line.match(/^CE\s*([A-Za-z0-9._-]*)\s*:\s*([^|]+?)\s*(?:\|\s*(.+))?$/i))){
      modo=null;
      const id="CE"+(m[1]||(ces.length+1));
      const titulo=m[2].trim();
      const cc=(m[3]||"").split(",").map(s=>s.trim().toUpperCase()).filter(Boolean);
      ceActual={id,titulo,cc,criterios:[]};
      ces.push(ceActual);
      return;
    }
    if((m=line.match(/^(\d+(?:\.\d+)?)\s*:\s*(.+)$/))){
      modo=null;
      if(!ceActual){ errores.push(`Línea ${n}: hay un criterio ("${line}") antes de definir ninguna competencia específica (una línea "CE1: …").`); return; }
      ceActual.criterios.push({id:m[1], texto:m[2].trim()});
      return;
    }
    errores.push(`Línea ${n}: no se entiende "${line.length>60?line.slice(0,60)+"…":line}". Revisa el formato.`);
  });
  return {materia,curso,ces,bloques,erroresFormato:errores};
}
function validarCatalogo(obj){
  const errores=[];
  if(!obj || typeof obj!=="object") return {ok:false, errores:["No se ha podido interpretar el contenido pegado."]};
  const materia=(obj.materia||"").toString().trim();
  const curso=(obj.curso||"").toString().trim();
  if(!materia) errores.push('Falta el nombre de la materia (línea "MATERIA: …").');
  if(!curso) errores.push('Falta el curso (línea "CURSO: …").');
  const ces=Array.isArray(obj.ces)?obj.ces:[];
  if(!ces.length) errores.push("No se ha definido ninguna competencia específica (CE).");
  const idsCE=new Set(), idsCriterio=new Set();
  const ccValidos=Object.keys(COMP_CLAVE);
  ces.forEach((ce,i)=>{
    const n=i+1, nombreCE=(ce&&ce.id)||`nº${n}`;
    const id=((ce&&ce.id)||"").toString().trim();
    if(!id) errores.push(`La competencia específica ${nombreCE} no tiene identificador.`);
    else if(idsCE.has(id)) errores.push(`El identificador de competencia específica "${id}" está repetido.`);
    idsCE.add(id||nombreCE);
    if(!((ce&&ce.titulo||"").toString().trim())) errores.push(`La competencia específica "${nombreCE}" no tiene título.`);
    const cc=Array.isArray(ce&&ce.cc)?ce.cc:[];
    if(!cc.length) errores.push(`La competencia específica "${nombreCE}" no tiene ninguna competencia clave asociada (CCL, STEM, CD, CP, CPSAA, CC, CE, CCEC).`);
    cc.forEach(c=>{ if(!ccValidos.includes(c)) errores.push(`"${c}" no es una competencia clave válida en "${nombreCE}" (usa: ${ccValidos.join(", ")}).`); });
    const criterios=Array.isArray(ce&&ce.criterios)?ce.criterios:[];
    if(!criterios.length) errores.push(`La competencia específica "${nombreCE}" no tiene ningún criterio de evaluación.`);
    criterios.forEach((cr,j)=>{
      const cid=((cr&&cr.id)||"").toString().trim();
      if(!cid) errores.push(`Un criterio de "${nombreCE}" no tiene identificador.`);
      else if(idsCriterio.has(cid)) errores.push(`El identificador de criterio "${cid}" está repetido.`);
      idsCriterio.add(cid||`${nombreCE}.${j+1}`);
      if(!((cr&&cr.texto||"").toString().trim())) errores.push(`El criterio "${cid||j+1}" de "${nombreCE}" no tiene texto.`);
    });
  });
  const bloques=Array.isArray(obj.bloques)?obj.bloques:[];
  if(!bloques.length) errores.push('No se ha definido ningún bloque de calificación (bloque "BLOQUES").');
  let sumaPesos=0;
  bloques.forEach((b,i)=>{
    if(!((b&&b.label||"").toString().trim())) errores.push(`El bloque nº${i+1} no tiene nombre.`);
    const peso=Number(b&&b.peso);
    if(!isFinite(peso)||peso<=0) errores.push(`El bloque "${(b&&b.label)||i+1}" no tiene un porcentaje válido.`);
    else sumaPesos+=peso;
  });
  let aviso=null;
  if(bloques.length && errores.length===0 && Math.abs(sumaPesos-100)>0.5){
    aviso=`Los porcentajes de los bloques suman ${sumaPesos}% (lo habitual es que sumen 100%). Se puede importar igualmente, pero conviene revisarlo.`;
  }
  return {ok:errores.length===0, errores, aviso, materia, curso};
}

  const rawSinComentarios=raw.split(/\r?\n/).filter(l=>!l.trim().startsWith("#")).join("\n");
  if(/\[[^\]\n]{2,80}\]/.test(rawSinComentarios)){
    mostrarResultadoImportacion(`<div class="alert-box" style="border-color:var(--danger);background:#fbeaea">⚠️ <strong>Parece que quedan marcadores de la plantilla sin sustituir</strong>, como <code>[Nombre de la materia]</code>. Sustituye todo lo que esté entre corchetes <code>[así]</code> por tus propios datos y vuelve a intentarlo.</div>`);
    return;
  }
  let obj, erroresFormato=[];
  const pareceJSON=raw.startsWith("{");
  if(pareceJSON){
    try{ obj=JSON.parse(raw); }
    catch(e){ mostrarResultadoImportacion(`<div class="alert-box" style="border-color:var(--danger);background:#fbeaea">⚠️ <strong>El texto parece JSON pero no es válido:</strong> ${esc(e.message)}</div>`); return; }
  } else {
    const parsed=parseCatalogoTexto(raw);
    obj={materia:parsed.materia, curso:parsed.curso, ces:parsed.ces, bloques:parsed.bloques};
    erroresFormato=parsed.erroresFormato;
  }
  const val=validarCatalogo(obj);
  const errores=[...erroresFormato, ...val.errores];
  if(errores.length){
    mostrarResultadoImportacion(`<div class="alert-box" style="border-color:var(--danger);background:#fbeaea;align-items:flex-start">
      <span>⚠️</span>
      <div><strong>No se ha podido importar. Revisa esto:</strong>
        <ul style="margin:6px 0 0;padding-left:18px">${errores.map(e=>`<li>${esc(e)}</li>`).join("")}</ul>
      </div>
    </div>`);
    return;
  }
  const key=slugCatalogo(val.materia,val.curso);
  if(state.catalogosPersonalizados[key] && !confirm(`Ya tienes una materia importada como "${val.materia} · ${val.curso}". ¿Reemplazarla por esta nueva versión? Los grupos que ya la usan pasarán a usar el catálogo nuevo.`)) return;
  const catalogo={
    materia:val.materia, curso:val.curso,
    ces:obj.ces.map(ce=>({
      id:String(ce.id).trim(), titulo:String(ce.titulo).trim(),
      cc:(ce.cc||[]).map(c=>String(c).trim().toUpperCase()),
      criterios:(ce.criterios||[]).map(cr=>({id:String(cr.id).trim(), texto:String(cr.texto).trim()}))
    })),
    bloques:obj.bloques.map(b=>({label:String(b.label).trim(), peso:Number(b.peso)}))
  };
  state.catalogosPersonalizados[key]=catalogo;
  delete CAT_CACHE[key];
  state.ui.catImportTexto="";
  save();
  const nCrit=catalogo.ces.reduce((n,ce)=>n+ce.criterios.length,0);
  mostrarResultadoImportacion(`<div class="alert-box" style="border-color:var(--accent);background:var(--accent-soft)">
    ✓ <strong>Importado correctamente:</strong> ${esc(catalogo.materia)} · ${esc(catalogo.curso)} — ${catalogo.ces.length} competencia${catalogo.ces.length===1?"":"s"} específica${catalogo.ces.length===1?"":"s"}, ${nCrit} criterio${nCrit===1?"":"s"}, ${catalogo.bloques.length} bloque${catalogo.bloques.length===1?"":"s"}.
    ${val.aviso?`<br>⚠️ ${esc(val.aviso)}`:""}
    <br>Ya puedes elegirla en "Crear grupo nuevo", abajo.
  </div>`);
  ta.value="";
  actualizarSelectCatalogos(key);
  renderListaCatalogosPersonalizados();
};

function pesoCriterio(grupo,cid){
  const v=grupo.pesos.crit[cid]; if(v!=null && v!=="") return Number(v);
  const idx=catIndex(grupo.catalogoKey);
  return 100/idx.ceMap[idx.critMap[cid].ceId].criterios.length;
}
function pesoCEenCC(grupo,ceId,cc){
  const v=grupo.pesos.ceCc[ceId+"|"+cc]; if(v!=null && v!=="") return Number(v);
  const idx=catIndex(grupo.catalogoKey);
  return 100/idx.cat.ces.filter(ce=>ce.cc.includes(cc)).length;
}
function defBloque(tipo,bloques){
  const t=tipo.toLowerCase();
  const byKw=kw=>bloques.find(b=>b.label.toLowerCase().includes(kw));
  let b=null;
  if(t.includes("diaria")||t.includes("casa")) b=byKw("diario")||byKw("casa");
  if(!b && t.includes("actitud")) b=byKw("actitud")||byKw("hábito")||byKw("habito");
  if(!b) b=bloques.reduce((max,cur)=>cur.peso>max.peso?cur:max,bloques[0]);
  return b.id;
}

function actsTrim(grupo){ return grupo.actividades.filter(a=>a.trimestre===state.ui.trim); }

function scoreCriterio(grupo,alId,cid){
  let sw=0,sv=0;
  for(const a of actsTrim(grupo)){
    const l=a.criterios.find(x=>x.critId===cid); if(!l) continue;
    const n=grupo.notas?.[alId]?.[a.id]?.[cid];
    if(n==null||n==="") continue;
    const w=Number(l.peso)||0; if(w<=0) continue;
    sw+=w; sv+=(Number(n)/10)*100*w;
  }
  return sw>0? sv/sw : null;
}
function scoreCE(grupo,alId,ceId){
  const idx=catIndex(grupo.catalogoKey);
  let sw=0,sv=0;
  for(const c of idx.ceMap[ceId].criterios){
    const sc=scoreCriterio(grupo,alId,c.id); if(sc==null) continue;
    const w=pesoCriterio(grupo,c.id); sw+=w; sv+=sc*w;
  }
  return sw>0? sv/sw : null;
}
function scoreCC(grupo,alId,cc){
  const idx=catIndex(grupo.catalogoKey);
  let sw=0,sv=0;
  for(const ce of idx.cat.ces){
    if(!ce.cc.includes(cc)) continue;
    const sc=scoreCE(grupo,alId,ce.id); if(sc==null) continue;
    const w=pesoCEenCC(grupo,ce.id,cc); sw+=w; sv+=sc*w;
  }
  return sw>0? sv/sw : null;
}
function nivel(grupo,p){
  if(p==null) return null;
  const u=grupo.umbrales;
  if(p>=u.excelente) return NIV.excelente;
  if(p>=u.adecuado) return NIV.adecuado;
  if(p>=u.enProceso) return NIV.enProceso;
  return NIV.necesita;
}

function notaActividad(grupo,alId,a){
  if(a.esExamen){
    /* Los exámenes tienen una nota cuantitativa propia e independiente de la
       calificación cualitativa de cada criterio (ver grupo.notasCuant). Esta
       es la única que cuenta para la nota de bloque/trimestre/final. */
    const vc=grupo.notasCuant?.[alId]?.[a.id];
    return (vc==null||vc==="")? null : Number(vc);
  }
  let sw=0,sv=0;
  for(const l of a.criterios){
    const n=grupo.notas?.[alId]?.[a.id]?.[l.critId];
    if(n==null||n==="") continue;
    const w=Number(l.peso)||0; if(w<=0) continue;
    sw+=w; sv+=Number(n)*w;
  }
  return sw>0? sv/sw : null;
}
function pesoActividadEnBloque(grupo,act){
  const v=act.pesoBloque; if(v!=null && v!=="") return Number(v);
  const n=grupo.actividades.filter(a=>a.trimestre===act.trimestre && a.bloqueId===act.bloqueId).length;
  return n>0? 100/n : 100;
}
function notaBloque(grupo,alId,bloqueId,trim){
  const acts=grupo.actividades.filter(a=>a.trimestre===trim && a.bloqueId===bloqueId);
  let sw=0,sv=0;
  for(const a of acts){
    const v=notaActividad(grupo,alId,a); if(v==null) continue;
    const w=pesoActividadEnBloque(grupo,a); if(w<=0) continue;
    sw+=w; sv+=v*w;
  }
  return sw>0? sv/sw : null;
}
function notaTrimestre(grupo,alId,trim){
  let sw=0,sv=0;
  for(const b of grupo.bloques){
    const v=notaBloque(grupo,alId,b.id,trim); if(v==null) continue;
    sw+=b.peso; sv+=v*b.peso;
  }
  return sw>0? sv/sw : null;
}
function pesoTrimestreEfectivo(grupo,t,disponibles){
  const v=grupo.pesosTrim && grupo.pesosTrim[t];
  if(v!=null && v!=="") return Number(v);
  return 100/disponibles.length;
}
function notaFinal(grupo,alId){
  const disponibles=[0,1,2].filter(t=>notaTrimestre(grupo,alId,t)!=null);
  if(!disponibles.length) return null;
  let sw=0,sv=0;
  for(const t of disponibles){
    const v=notaTrimestre(grupo,alId,t);
    const w=pesoTrimestreEfectivo(grupo,t,disponibles);
    sw+=w; sv+=v*w;
  }
  return sw>0? sv/sw : null;
}
const fmt=x=>x==null?"—":x.toFixed(1).replace(".",",");
function pillHTML(grupo,p){
  const nv=nivel(grupo,p);
  if(!nv) return '<span style="color:var(--mut);font-size:13px">—</span>';
  return `<span class="pill" style="background:${nv.bg};color:${nv.fg}"><strong>${p.toFixed(0)}%</strong> ${nv.etq}</span>`;

function pillCuant(v){

function actividadesDeCriterio(grupo,alId,cid){
  const set=new Set();
  for(const a of actsTrim(grupo)){
    const l=a.criterios.find(x=>x.critId===cid); if(!l) continue;
    const n=grupo.notas?.[alId]?.[a.id]?.[cid];
    if(n==null||n==="") continue;
    set.add(a.nombre);
  }
  return [...set];
}
function actividadesDeCE(grupo,alId,ceId){
  const idx=catIndex(grupo.catalogoKey);
  const set=new Set();
  idx.ceMap[ceId].criterios.forEach(c=>actividadesDeCriterio(grupo,alId,c.id).forEach(n=>set.add(n)));
  return [...set];
}
function actividadesDeCC(grupo,alId,cc){
  const idx=catIndex(grupo.catalogoKey);
  const set=new Set();
  idx.cat.ces.filter(ce=>ce.cc.includes(cc)).forEach(ce=>actividadesDeCE(grupo,alId,ce.id).forEach(n=>set.add(n)));
  return [...set];
}
function abrevActs(names,max=3){
  if(!names.length) return "Sin actividades con nota en este periodo";
  const shown=names.slice(0,max).join(" · ");
  return names.length>max? `${shown} · +${names.length-max} más` : shown;
}

/* =================================================================
   Informe final de curso: agregados anuales (media de las 3 evaluaciones)
   Varias funciones de puntuación (scoreCriterio, scoreCE, scoreCC,
   actividadesDeCE/CC…) dependen del trimestre "actual" (state.ui.trim).
   conTrim() permite reutilizarlas para un trimestre concreto sin tocar
   la interfaz: cambia el trimestre global, ejecuta la función y lo
   restaura siempre (incluso si la función lanza un error).
   ================================================================= */
function conTrim(trim,fn){
  const prev=state.ui.trim;
  state.ui.trim=trim;
  try{ return fn(); } finally { state.ui.trim=prev; }
}
/* Media ponderada (misma lógica que notaFinal) de una puntuación de
   competencia a lo largo de los trimestres en los que hay dato. */
function mediaAnualPonderada(grupo,valoresPorTrim){
  const disponibles=valoresPorTrim.filter(x=>x.v!=null);
  if(!disponibles.length) return null;
  const trims=disponibles.map(x=>x.t);
  let sw=0,sv=0;
  for(const {t,v} of disponibles){ const w=pesoTrimestreEfectivo(grupo,t,trims); sw+=w; sv+=v*w; }
  return sw>0? sv/sw : null;
}
function scoreCEAnual(grupo,alId,ceId){
  return mediaAnualPonderada(grupo,[0,1,2].map(t=>({t,v:conTrim(t,()=>scoreCE(grupo,alId,ceId))})));
}
function scoreCCAnual(grupo,alId,cc){
  return mediaAnualPonderada(grupo,[0,1,2].map(t=>({t,v:conTrim(t,()=>scoreCC(grupo,alId,cc))})));
}
function actividadesDeCEAnual(grupo,alId,ceId){
  const set=new Set();
  for(const t of [0,1,2]) conTrim(t,()=>actividadesDeCE(grupo,alId,ceId)).forEach(n=>set.add(n));
  return [...set];
}
function actividadesDeCCAnual(grupo,alId,cc){
  const set=new Set();
  for(const t of [0,1,2]) conTrim(t,()=>actividadesDeCC(grupo,alId,cc)).forEach(n=>set.add(n));
  return [...set];
}

const AG_TIPOS=[

function agEventosFiltrados(lista){

function agExamenesDisponibles(){

function agIcsEscape(s){ return String(s||"").replace(/\\/g,"\\\\").replace(/;/g,"\\;").replace(/,/g,"\\,").replace(/\n/g,"\\n"); }
function agGenerarICS(){
  const evs=agEventosFiltrados(state.eventos||[]).slice().sort((a,b)=>a.fecha.localeCompare(b.fecha));
  const ahora=new Date().toISOString().replace(/[-:]/g,"").split(".")[0]+"Z";
  let ics="BEGIN:VCALENDAR\r\nVERSION:2.0\r\nPRODID:-//Geografia e Historia//Calendario//ES\r\nCALSCALE:GREGORIAN\r\n";
  evs.forEach(e=>{
    const info=agTipoInfo(e.tipo);
    const grupo=e.grupoId?state.grupos.find(g=>g.id===e.grupoId):null;
    const desc=[info.label, grupo?("Grupo: "+grupo.nombre):"", e.notas||""].filter(Boolean).join(" — ");
    ics+="BEGIN:VEVENT\r\nUID:"+e.id+"@geohist-suite\r\nDTSTAMP:"+ahora+"\r\nDTSTART;VALUE=DATE:"+e.fecha.replace(/-/g,"")+"\r\n";
    ics+="SUMMARY:"+agIcsEscape(e.titulo)+"\r\n";
    if(desc) ics+="DESCRIPTION:"+agIcsEscape(desc)+"\r\n";
    ics+="END:VEVENT\r\n";
  });
  return ics+"END:VCALENDAR\r\n";
}

window.agGuardarEvento=()=>{
  const fecha=document.getElementById("agFFecha").value;
  const titulo=document.getElementById("agFTitulo").value.trim();
  const tipo=document.getElementById("agFTipo").value;
  const grupoId=document.getElementById("agFGrupo").value;
  const notas=document.getElementById("agFNotas").value.trim();
  const examId = tipo==="examen" ? (document.getElementById("agFExamen")?.value||"") : "";
  const reunionId = tipo==="reunion" ? (document.getElementById("agFReunion")?.value||"") : "";
  if(!fecha || !titulo) return;
  if(!Array.isArray(state.eventos)) state.eventos=[];
  const id=state.ui.agModalEventId;
  if(id){
    const ev=state.eventos.find(e=>e.id===id);
    if(ev){ ev.fecha=fecha; ev.titulo=titulo; ev.tipo=tipo; ev.grupoId=grupoId; ev.notas=notas; ev.examId=examId; ev.reunionId=reunionId; }
  }else{
    const repetir=document.getElementById("agFRepetir")?.checked;
    const hasta=repetir? document.getElementById("agFRepetirHasta")?.value : "";
    if(repetir && hasta && hasta>fecha){
      const recurrenciaId=uid();
      const fin=new Date(hasta+"T00:00:00");
      let cur=new Date(fecha+"T00:00:00");
      let creados=0;
      while(cur<=fin && creados<52){
        const f=cur.getFullYear()+"-"+String(cur.getMonth()+1).padStart(2,"0")+"-"+String(cur.getDate()).padStart(2,"0");
        state.eventos.push({id:uid(),fecha:f,titulo,tipo,grupoId,notas,examId:"",reunionId:"",recurrenciaId});
        cur.setDate(cur.getDate()+7); creados++;
      }
    }else{
      state.eventos.push({id:uid(),fecha,titulo,tipo,grupoId,notas,examId,reunionId,recurrenciaId:""});
    }
  }
  state.ui.agMes=fecha.slice(0,7);
  state.ui.agModalFecha=""; state.ui.agModalEventId="";
  save(); render();
};

    const grupo=r.grupoId?state.grupos.find(g=>g.id===r.grupoId):null;
    const nAsist=(r.asistentes||[]).filter(a=>a.nombre&&a.nombre.trim()).length;
    const nTemas=(r.ordenDia||[]).filter(t=>t&&t.trim()).length;
    const nAcuerdos=(r.acuerdos||[]).filter(a=>a&&a.trim()).length;
    csv+=[esc2(r.titulo),esc2(info.label),esc2(fmt2(r.fecha)),esc2(r.horaInicio||""),esc2(grupo?grupo.nombre:""),esc2(alV?alV.al.nombre:""),esc2(r.estado==="cerrada"?"Cerrada":"Borrador"),nAsist,nTemas,nAcuerdos].join(";")+"\n";
  });
  const blob=new Blob(["\ufeff"+csv],{type:"text/csv;charset=utf-8;"});
  const u=URL.createObjectURL(blob); const a=document.createElement("a");

};

];
function rfEstadoInfo(id){ return RF_ESTADOS.find(e=>e.id===id)||RF_ESTADOS[0]; }

function rfListaFiltrada(){

}

function rfrpTablaCEPrintHTML(gruposCE){

  grupos.forEach(g=>{

      }
      filas+=`<td>${esc(c.texto)}</td><td style="text-align:center">${c.trabajado?"✓":"—"}</td></tr>`;
    });

window.rpRefrescarAlumnoSel=()=>{
  const gid=document.getElementById("rpNGrupo").value;
  const wrap=document.getElementById("rpNAlumnoWrap");
  const g=state.grupos.find(x=>x.id===gid);
  if(!g || !g.alumnos.length){ wrap.innerHTML='<p class="sub" style="margin:0">Este grupo no tiene alumnado todavía.</p>'; return; }
  wrap.innerHTML=`<label style="font-size:12.5px;color:var(--mut);font-weight:500">Alumno/a
    <select class="in" style="width:100%;margin-top:4px" id="rpNAlumno">
      ${g.alumnos.map(al=>`<option value="${al.id}">${esc(al.nombre)}</option>`).join("")}
    </select>
  </label>`;
  const cursoInput=document.getElementById("rpNCurso");
  if(cursoInput && !cursoInput.value.trim()){
    const cat=getCatalogo(g.catalogoKey);
    if(cat && cat.curso) cursoInput.value=cat.curso+" (repite)";
  }
};
window.rpCrearPlan=()=>{
  const grupoId=document.getElementById("rpNGrupo").value;
  const alumnoId=document.getElementById("rpNAlumno")?.value;
  if(!alumnoId){ alert("Este grupo no tiene alumnado."); return; }
  const g=state.grupos.find(x=>x.id===grupoId); const al=g.alumnos.find(x=>x.id===alumnoId);
  const cursoRepite=document.getElementById("rpNCurso").value.trim();
  const cursoAcademico=document.getElementById("rpNCursoAcademico").value.trim();
  const fechaInicio=document.getElementById("rpNFecha").value;
  const nivelModelo=document.getElementById("rpNModelo").value;
  const trimestres=rfrpTrimestresIniciales(nivelModelo);
  const p={ id:uid(), grupoId, alumnoId, alumnoNombre:al.nombre, cursoRepite, cursoAcademico,
    motivos:rfrpMotivosDefault(), medidasNivelII:rpMedidasDefault(RP_MEDIDAS_II), medidasNivelIII:rpMedidasDefault(RP_MEDIDAS_III),
    fechaInicio, estado:"activo", trimestres, valoracionFinal:"",
    observacionesFinales:"", planOrigenId:"", planOrigenTipo:"" };

  save(); render();
};

window.crearPlanSiguienteCurso=tipoDestino=>{
  const {tipo,id}=state.ui.prepModal;
  const origen = tipo==="refuerzo" ? (state.planesRefuerzo||[]).find(x=>x.id===id) : (state.planesRepeticion||[]).find(x=>x.id===id);
  if(!origen) return;
  const nombre = tipo==="refuerzo" ? rfNombre(origen) : rpNombre(origen);
  const obsPrevias=(origen.observacionesFinales||"").trim();
  const motivos=rfrpMotivosDefault();
  motivos.otros=true;
  motivos.otrosTexto=`Continuación del Plan de ${tipo==="refuerzo"?"Refuerzo":"Repetición"} del curso anterior.`+(obsPrevias?" Observaciones del curso anterior: "+obsPrevias:"");
  if(tipoDestino==="repeticion"){
    const p={ id:uid(), grupoId:"", alumnoId:"", alumnoNombre:nombre, cursoRepite:"", cursoAcademico:"",
      motivos, medidasNivelII:rpMedidasDefault(RP_MEDIDAS_II), medidasNivelIII:rpMedidasDefault(RP_MEDIDAS_III),
      fechaInicio:"", estado:"activo", trimestres:rfrpTrimestresIniciales(""), valoracionFinal:"",
      observacionesFinales:"", planOrigenId:id, planOrigenTipo:tipo };
    if(!Array.isArray(state.planesRepeticion)) state.planesRepeticion=[];
    state.planesRepeticion.push(p);
    state.ui.prepModal=null; state.ui.appMode="repeticion"; state.ui.rpTab="detalle"; state.ui.rpId=p.id;
  }else{
    const p={ id:uid(), grupoId:"", alumnoId:"", alumnoNombre:nombre, titulo:"Seguimiento — "+nombre, cursoAcademico:"",
      motivos, trimestres:rfrpTrimestresIniciales(""), fechaInicio:"", fechaFinPrevista:"", estado:"activo", seguimiento:[], valoracionFinal:"",
      observacionesFinales:"", planOrigenId:id, planOrigenTipo:tipo };
    if(!Array.isArray(state.planesRefuerzo)) state.planesRefuerzo=[];
    state.planesRefuerzo.push(p);
    state.ui.prepModal=null; state.ui.appMode="refuerzo"; state.ui.rfTab="detalle"; state.ui.rfId=p.id;
  }
  save(); render();
};

/* =================================================================
   ALUMNOS NESE — plan de seguimiento curricular adaptado para
   alumnado NESE, organizado por grupo. Cada plan copia uno de los
   3 modelos de NESE_MODELOS (según ciclo elegido) y se rellena con
   I/P/A por trimestre. Vive en state.planesNESE (top-level, se
   incluye solo con Exportar/Importar copia).
   ================================================================= */
const NE_VALORES=[
  {id:"",label:"—"},
  {id:"I",label:"Iniciado"},
  {id:"P",label:"En proceso"},
  {id:"A",label:"Alcanzado"}
];
function neValorColor(v){ return v==="A"?"#16a34a":v==="P"?"#b45309":v==="I"?"#2563eb":"var(--mut)"; }
function neAlumno(p){ const g=state.grupos.find(x=>x.id===p.grupoId); if(!g) return null; const al=g.alumnos.find(x=>x.id===p.alumnoId); return al?{al,g}:null; }
function neNombre(p){ const alV=neAlumno(p); return alV?alV.al.nombre:(p.alumnoNombre||"(sin asignar)"); }
function neCicloSugerido(al){
  const n=al.neseNivel||"";
  if(["1º de Primaria","2º de Primaria"].includes(n)) return "1";
  if(["3º de Primaria","4º de Primaria"].includes(n)) return "2";
  if(["5º de Primaria","6º de Primaria"].includes(n)) return "3";
  return "";
}
function nePlanDe(alumnoId){ return (state.planesNESE||[]).find(p=>p.alumnoId===alumnoId); }
function neResumenPlan(p){
  let i=0,pr=0,a=0;
  (p.filas||[]).forEach(f=>{ [f.v1,f.v2,f.v3].forEach(v=>{ if(v==="I")i++; else if(v==="P")pr++; else if(v==="A")a++; }); });
  return {i,pr,a};
}
window.neTab=k=>{ state.ui.neTab=k; if(k==="lista") state.ui.neId=""; save(); render(); };
window.neIrLista=()=>{ state.ui.neTab="lista"; state.ui.neId=""; save(); render(); };
window.neAbrirDetalle=id=>{ state.ui.neTab="detalle"; state.ui.neId=id; save(); render(); };
window.neAbrirDesdeOtroModo=id=>{ state.ui.appMode="nese"; state.ui.neTab="detalle"; state.ui.neId=id; save(); render(); };
window.neAbrirModalCrear=(grupoId,alumnoId)=>{ state.ui.neModalCrear={grupoId,alumnoId}; save(); render(); };
window.neCerrarModalCrear=()=>{ state.ui.neModalCrear=null; save(); render(); };

function renderNeseApp(){
  const app=document.getElementById("app");
  app.innerHTML=`<div class="card" style="padding:12px 16px">
    <div class="flex" style="justify-content:space-between">
      <div><strong style="font-size:15px">🧩 Alumnos NESE</strong><span style="color:var(--mut);font-size:13px"> · seguimiento curricular adaptado</span></div>
      <button class="ghost" style="border:1px solid var(--line)" onclick="irInicio()">🏠 Inicio</button>
    </div>
  </div><div id="neRoot"></div>`;
  const root=document.getElementById("neRoot");
  if(state.ui.neTab==="detalle" && state.ui.neId && (state.planesNESE||[]).find(p=>p.id===state.ui.neId)){
    renderNeDetalleHTML(root);
  }else{
    renderNeListaHTML(root);
  }
  if(state.ui.neModalCrear) root.insertAdjacentHTML("beforeend", neRenderModalCrearHTML());
}

function renderNeListaHTML(root){
  const gruposConNese=state.grupos.map(g=>({g, alumnos:g.alumnos.filter(a=>a.nese)})).filter(x=>x.alumnos.length);
  const totalNese=gruposConNese.reduce((s,x)=>s+x.alumnos.length,0);
  const totalPlanes=(state.planesNESE||[]).length;
  if(!gruposConNese.length){
    root.innerHTML=`<div class="card"><p class="sub" style="margin:0">Todavía no hay alumnado marcado como NESE. Márcalo desde Evaluación por Competencias → Alumnado (columna NESE), y aparecerá aquí automáticamente.</p></div>`;
    return;
  }
  const bloques=gruposConNese.map(({g,alumnos})=>{
    const filas=alumnos.map(al=>{
      const p=nePlanDe(al.id);
      if(!p){
        return `<div class="row" style="justify-content:space-between">
          <div><strong>${esc(al.nombre)}</strong>${al.neseNivel?` <span class="sub">· nivel de referencia: ${esc(al.neseNivel)}</span>`:""}</div>
          <button class="btn small" onclick="neAbrirModalCrear('${g.id}','${al.id}')">+ Crear plan</button>
        </div>`;
      }
      const r=neResumenPlan(p);
      return `<div class="row" style="justify-content:space-between;cursor:pointer" onclick="neAbrirDetalle('${p.id}')">
        <div><strong>${esc(al.nombre)}</strong> <span class="badge">Modelo ciclo ${p.ciclo}</span></div>
        <div class="flex" style="gap:6px">
          <span class="pill" style="background:#dbeafe;color:#1d4ed8">${r.i} I</span>
          <span class="pill" style="background:#fef3c7;color:#92400e">${r.pr} P</span>
          <span class="pill" style="background:#dcfce7;color:#166534">${r.a} A</span>
        </div>
      </div>`;
    }).join("");
    return `<div class="card">
      <h2 style="font-size:15px">${esc(g.nombre)}</h2>
      <div class="grid" style="gap:8px;margin-top:8px">${filas}</div>
    </div>`;
  }).join("");
  root.innerHTML=`
  <div class="card">
    <div class="flex" style="gap:16px">
      <div><div class="big" style="font-size:24px">${totalNese}</div><div class="sub" style="margin:0">Alumnado NESE</div></div>
      <div><div class="big" style="font-size:24px">${totalPlanes}</div><div class="sub" style="margin:0">Con plan creado</div></div>
    </div>
  </div>
  ${bloques}`;
}

function neRenderModalCrearHTML(){
  const {grupoId,alumnoId}=state.ui.neModalCrear;
  const g=state.grupos.find(x=>x.id===grupoId); const al=g?g.alumnos.find(x=>x.id===alumnoId):null;
  if(!al) return "";
  const sugerido=neCicloSugerido(al);
  return `<div class="modal-overlay" onclick="if(event.target===this) neCerrarModalCrear()">
    <div class="modal-box" style="max-width:480px">
      <div class="flex" style="justify-content:space-between;align-items:flex-start">
        <h2 style="font-size:17px">Nuevo plan NESE — ${esc(al.nombre)}</h2>
        <button class="modal-close" onclick="neCerrarModalCrear()">×</button>
      </div>
      <p class="sub" style="margin-top:6px">Elige el modelo según el nivel de competencia curricular real del alumno/a (no su curso de matrícula).${al.neseNivel?` Su nivel de referencia actual es <strong>${esc(al.neseNivel)}</strong>.`:""}</p>
      <div class="grid" style="gap:8px;margin-top:8px" id="neCicloOpciones">
        ${["1","2","3"].map(c=>{
          const label=c==="1"?"Modelo 1 · 1er ciclo de Primaria (1º-2º)":c==="2"?"Modelo 2 · 2º ciclo de Primaria (3º-4º)":"Modelo 3 · 3er ciclo de Primaria (5º-6º)";
          return `<button class="chip ${c===sugerido?"on":""}" style="text-align:left;padding:10px 14px;justify-content:flex-start" data-ciclo="${c}" onclick="document.querySelectorAll('#neCicloOpciones .chip').forEach(b=>b.classList.remove('on'));this.classList.add('on')">${label}${c===sugerido?" — sugerido":""}</button>`;
        }).join("")}
      </div>
      <div class="grid" style="gap:10px;margin-top:14px">
        <label style="font-size:12.5px;color:var(--mut);font-weight:500">Necesidad educativa específica (breve)
          <input class="in" style="width:100%;margin-top:4px" id="neNNecesidad" placeholder="Ej. discapacidad intelectual leve, TEA…">
        </label>
        <label style="font-size:12.5px;color:var(--mut);font-weight:500">Medidas de acceso previstas
          <input class="in" style="width:100%;margin-top:4px" id="neNMedidas" placeholder="Ej. apoyo PT dentro del aula, materiales adaptados…">
        </label>
        <label style="font-size:12.5px;color:var(--mut);font-weight:500">Fecha de inicio
          <input class="in" style="width:100%;margin-top:4px" type="date" id="neNFecha" value="${agHoyStr()}">
        </label>
      </div>
      <div class="flex" style="justify-content:flex-end;margin-top:18px">
        <button class="ghost" onclick="neCerrarModalCrear()">Cancelar</button>
        <button class="btn" onclick="neCrearPlan()">Crear plan</button>
      </div>
    </div>
  </div>`;
}
window.neCrearPlan=()=>{
  const {grupoId,alumnoId}=state.ui.neModalCrear;
  const g=state.grupos.find(x=>x.id===grupoId); const al=g.alumnos.find(x=>x.id===alumnoId);
  const cicloBtn=document.querySelector('#neCicloOpciones .chip.on');
  if(!cicloBtn){ alert("Elige uno de los tres modelos."); return; }
  const ciclo=cicloBtn.dataset.ciclo;
  const necesidadEspecifica=document.getElementById("neNNecesidad").value.trim();
  const medidasAcceso=document.getElementById("neNMedidas").value.trim();
  const fechaInicio=document.getElementById("neNFecha").value;
  const filas=[];
  NESE_MODELOS[ciclo].forEach(bloque=>{
    bloque.filas.forEach(f=>{
      filas.push({ id:uid(), bloque:bloque.titulo, saber:f.saber, criterio:f.criterio, ce:f.ce, cc:f.cc, v1:"", v2:"", v3:"" });
    });
  });
  const p={ id:uid(), grupoId, alumnoId, alumnoNombre:al.nombre, ciclo, necesidadEspecifica, medidasAcceso, fechaInicio, filas,
    valoracion1T:"", valoracion2T:"", valoracion3T:"", valoracionFinal:"" };
  if(!Array.isArray(state.planesNESE)) state.planesNESE=[];
  state.planesNESE.push(p);
  state.ui.neModalCrear=null; state.ui.neTab="detalle"; state.ui.neId=p.id;
  save(); render();
};

window.neSetValor=(filaId,campo,valor)=>{

window.neEliminarPlan=id=>{
  if(!confirm("¿Eliminar este plan NESE? No se puede deshacer.")) return;

  state.ui.neTab="lista"; state.ui.neId="";

window.neImprimirInforme=(id,alcance)=>{
  const p=(state.planesNESE||[]).find(x=>x.id===id); if(!p) return;
  const alV=neAlumno(p);
  const cesUsadas=[...new Set(p.filas.map(f=>f.ce).filter(c=>c && c!=="Transversal"))];
  const ceTabla=cesUsadas.length?`<table><thead><tr><th style="width:70px">Código</th><th>Competencia específica</th></tr></thead><tbody>
    ${cesUsadas.map(c=>`<tr><td>${c}</td><td>${esc(NESE_CE[c]||"")}</td></tr>`).join("")}
  </tbody></table>`:"";
  const bloquesAgrupados=[];
  p.filas.forEach(f=>{
    let b=bloquesAgrupados.find(x=>x.titulo===f.bloque);
    if(!b){ b={titulo:f.bloque, filas:[]}; bloquesAgrupados.push(b); }
    b.filas.push(f);
  });
  let cuerpoBloques;
  const etiquetaEv={"1":"1ª evaluación","2":"2ª evaluación","3":"3ª evaluación","final":"Curso completo"}[alcance];
  if(alcance==="final"){
    cuerpoBloques=bloquesAgrupados.map(b=>{
      const filas=b.filas.filter(f=>f.v1||f.v2||f.v3);
      if(!filas.length) return "";
      return `<h2>${esc(b.titulo)}</h2>
        <table><thead><tr><th>Saber básico</th><th>Criterio</th><th>1T</th><th>2T</th><th>3T</th></tr></thead><tbody>
        ${filas.map(f=>`<tr><td>${esc(f.saber)}</td><td style="font-size:12px">${esc(f.criterio)}</td><td style="text-align:center">${f.v1||"—"}</td><td style="text-align:center">${f.v2||"—"}</td><td style="text-align:center">${f.v3||"—"}</td></tr>`).join("")}
        </tbody></table>`;
    }).join("");
  }else{
    const campo="v"+alcance;
    cuerpoBloques=bloquesAgrupados.map(b=>{
      const filas=b.filas.filter(f=>f[campo]);
      if(!filas.length) return "";
      return `<h2>${esc(b.titulo)}</h2>
        <table><thead><tr><th>Saber básico</th><th>Criterio</th><th>Valoración</th></tr></thead><tbody>
        ${filas.map(f=>`<tr><td>${esc(f.saber)}</td><td style="font-size:12px">${esc(f.criterio)}</td><td style="text-align:center;font-weight:700">${f[campo]}</td></tr>`).join("")}
        </tbody></table>`;
    }).join("");
  }
  if(!cuerpoBloques.trim()) cuerpoBloques='<p style="color:#999;font-style:italic">Sin registros para este periodo.</p>';
  let valoracionesBody="";
  if(alcance==="final"){
    const partes=[];
    if(p.valoracion1T) partes.push(`<p><strong>1ª evaluación:</strong> ${esc(p.valoracion1T)}</p>`);
    if(p.valoracion2T) partes.push(`<p><strong>2ª evaluación:</strong> ${esc(p.valoracion2T)}</p>`);
    if(p.valoracion3T) partes.push(`<p><strong>3ª evaluación:</strong> ${esc(p.valoracion3T)}</p>`);
    if(p.valoracionFinal) partes.push(`<p><strong>Valoración final:</strong> ${esc(p.valoracionFinal)}</p>`);
    if(partes.length) valoracionesBody=`<h2>Valoración del aprovechamiento del plan</h2>${partes.join("")}`;
  }else{
    const valTrim=p["valoracion"+alcance+"T"];
    if(valTrim) valoracionesBody=`<h2>Valoración de la evaluación</h2><p>${esc(valTrim)}</p>`;
  }
  const body=`
    <h1>Plan de Seguimiento NESE</h1>
    <div class="meta">${esc(neNombre(p))}${alV?" · "+esc(alV.g.nombre):""} · ${etiquetaEv} · Generado el ${new Date().toLocaleDateString("es-ES")}</div>
    <p style="font-size:13px;color:#666">Escala de valoración: <strong>I</strong> = Iniciado · <strong>P</strong> = En proceso · <strong>A</strong> = Alcanzado</p>
    <table>
      <tr><th style="width:160px">Necesidad educativa específica</th><td>${esc(p.necesidadEspecifica||"—")}</td></tr>
      <tr><th>Medidas de acceso</th><td>${esc(p.medidasAcceso||"—")}</td></tr>
      <tr><th>Fecha de inicio</th><td>${fmt2(p.fechaInicio)}</td></tr>
      <tr><th>Modelo utilizado</th><td>Ciclo ${p.ciclo} de Primaria</td></tr>
    </table>
    ${ceTabla?`<h2>Competencias específicas</h2>${ceTabla}`:""}
    ${cuerpoBloques}
    ${valoracionesBody}
  `;
  abrirVentanaInforme(`Plan NESE — ${neNombre(p)} · ${etiquetaEv}`, body);
};

/* =================================================================

   del centro. Cada celda: Clase (materia/nivel-grupo/aula), Guardia,
   Complementaria, Reducción, Recreo u Otro, con nota libre donde
   aplica. Vive en state.horario (top-level, se incluye solo con
   Exportar/Importar copia).
   ================================================================= */
const HOR_FILAS=[
  {inicio:"07:45",fin:"08:00",recreo:false},
  {inicio:"08:00",fin:"08:55",recreo:false},
  {inicio:"08:55",fin:"09:50",recreo:false},
  {inicio:"09:50",fin:"10:45",recreo:false},
  {inicio:"10:45",fin:"11:15",recreo:true},
  {inicio:"11:15",fin:"12:10",recreo:false},
  {inicio:"12:10",fin:"13:05",recreo:false},
  {inicio:"13:05",fin:"14:00",recreo:false},
  {inicio:"14:00",fin:"14:10",recreo:true},
  {inicio:"14:10",fin:"15:05",recreo:false},
];
const HOR_DIAS=[{id:"L",label:"Lunes"},{id:"M",label:"Martes"},{id:"X",label:"Miércoles"},{id:"J",label:"Jueves"},{id:"V",label:"Viernes"}];
const HOR_TIPOS=[
  {id:"",label:"— Vacío —",color:"var(--muted-border)"},
  {id:"clase",label:"Clase",color:"#2563eb"},
  {id:"guardia",label:"Guardia",color:"#b45309"},
  {id:"complementaria",label:"Complementaria",color:"#7c3aed"},
  {id:"reduccion",label:"Reducción",color:"#0d9488"},
  {id:"reunion",label:"Reunión",color:"#be185d"},
  {id:"atencionFamilias",label:"Atención a Familias",color:"#15803d"},
  {id:"recreo",label:"Recreo",color:"#64748b"},
  {id:"otro",label:"Otro",color:"#64748b"}
];
function horTipoInfo(id){ return HOR_TIPOS.find(t=>t.id===id)||HOR_TIPOS[0]; }
function horClave(fila,dia){ return fila+"-"+dia; }
function horCelda(fila,dia){
  const c=(state.horario&&state.horario.celdas)?state.horario.celdas[horClave(fila,dia)]:null;
  if(c) return c;
  if(HOR_FILAS[fila].recreo) return {tipo:"recreo",materia:"",nivelGrupo:"",aula:"",nota:""};
  return {tipo:"",materia:"",nivelGrupo:"",aula:"",nota:""};
}
