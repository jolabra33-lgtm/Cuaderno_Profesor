window.horActualizarCamposModal=()=>{
  const tipo=document.getElementById("horFTipo").value;
  document.getElementById("horFCamposClase").style.display=tipo==="clase"?"":"none";
  document.getElementById("horFCamposNota").style.display=(tipo&&tipo!=="clase")?"":"none";
};
window.horGuardarCelda=(fila,dia)=>{
  const tipo=document.getElementById("horFTipo").value;
  const celda={ tipo,
    materia:tipo==="clase"?document.getElementById("horFMateria").value.trim():"",
    nivelGrupo:tipo==="clase"?document.getElementById("horFNivelGrupo").value.trim():"",
    aula:tipo==="clase"?document.getElementById("horFAula").value.trim():"",
    nota:(tipo&&tipo!=="clase")?document.getElementById("horFNota").value.trim():""
  };
  if(!state.horario) state.horario={celdas:{}};
  if(!state.horario.celdas) state.horario.celdas={};
  state.horario.celdas[horClave(fila,dia)]=celda;
  state.ui.horModalCelda=null;
  save(); render();
};
window.horBorrarCelda=(fila,dia)=>{
  if(!state.horario) state.horario={celdas:{}};
  if(!state.horario.celdas) state.horario.celdas={};
  // Se guarda explícitamente vacía (en vez de borrar la clave) para que, en las
  // filas de Recreo, quede realmente en blanco y no vuelva a aparecer "Recreo"
  // por defecto ese día concreto.
  state.horario.celdas[horClave(fila,dia)]={tipo:"",materia:"",nivelGrupo:"",aula:"",nota:""};
  state.ui.horModalCelda=null;
  save(); render();
};
/* Copiar/pegar casillas: estado puramente de sesión (no persistido), igual
   que el resto de "modo" de Inicio — se resetea al recargar la página. */
let horPortapapeles=null;
function horResumenTextoPlano(c){
  const info=horTipoInfo(c.tipo);
  if(c.tipo==="clase") return `${c.materia||"Clase"}${c.nivelGrupo?" · "+c.nivelGrupo:""}`;
  return info.label+(c.nota?" — "+c.nota:"");
}
window.horCopiarCelda=(fila,dia)=>{
  const c=horCelda(fila,dia);
  if(!c.tipo) return;
  horPortapapeles={tipo:c.tipo, materia:c.materia||"", nivelGrupo:c.nivelGrupo||"", aula:c.aula||"", nota:c.nota||""};
  render();
};
window.horPegarEnCelda=(fila,dia)=>{
  if(!horPortapapeles) return;
  if(!state.horario) state.horario={celdas:{}};
  if(!state.horario.celdas) state.horario.celdas={};
  state.horario.celdas[horClave(fila,dia)]={...horPortapapeles};
  save(); render();
};
window.horCancelarCopia=()=>{ horPortapapeles=null; render(); };
function horCeldaResumenHTML(fila,dia){
  const c=horCelda(fila,dia);
  const info=horTipoInfo(c.tipo);
  if(!c.tipo) return "";
  if(c.tipo==="clase"){
    return `<div style="font-weight:700;font-size:11.5px;line-height:1.25">${esc(c.materia||"Clase")}</div>
      ${c.nivelGrupo?`<div style="font-size:10.5px;opacity:.85">${esc(c.nivelGrupo)}</div>`:""}
      ${c.aula?`<div style="font-size:10px;opacity:.7">${esc(c.aula)}</div>`:""}`;
  }
  return `<div style="font-weight:700;font-size:11px">${info.label}</div>${c.nota?`<div style="font-size:10px;opacity:.8">${esc(c.nota)}</div>`:""}`;
}
function horRenderGridHTML(){
  const enModoCopia=!!horPortapapeles;
  const cabecera=`<div class="hor-cell hor-head"></div>`+HOR_DIAS.map(d=>`<div class="hor-cell hor-head">${d.label}</div>`).join("");
  const filas=HOR_FILAS.map((f,fi)=>{
    const horaLbl=`<div class="hor-cell hor-time">${f.inicio}<br>${f.fin}</div>`;
    const celdas=HOR_DIAS.map(d=>{
      const c=horCelda(fi,d.id);
      const info=horTipoInfo(c.tipo);
      const vacio=!c.tipo;
      const onclickAttr=enModoCopia?`horPegarEnCelda(${fi},'${d.id}')`:`horAbrirModal(${fi},'${d.id}')`;
      const copiarBtn=(!vacio && !enModoCopia)?`<button class="hor-copiar-btn" onclick="event.stopPropagation();horCopiarCelda(${fi},'${d.id}')" title="Copiar esta casilla">📋</button>`:"";
      return `<div class="hor-cell hor-slot ${c.tipo==="recreo"?"hor-slot-recreo":""} ${enModoCopia?"hor-slot-pegar":""}" style="${!vacio?`background:${info.color}1a;border-color:${info.color}55;color:${info.color}`:""}" onclick="${onclickAttr}">
        ${horCeldaResumenHTML(fi,d.id)}
        ${copiarBtn}
      </div>`;
    }).join("");
    return `${horaLbl}${celdas}`;
  }).join("");
  const bannerCopia=enModoCopia?`<div class="alert-box" style="margin-bottom:10px;align-items:center;flex-wrap:wrap;gap:8px">
    <span>📋 <strong>Copiando:</strong> ${esc(horResumenTextoPlano(horPortapapeles))} — toca cualquier casilla para pegar. Puedes pegar en varias seguidas.</span>
    <button class="ghost small" onclick="horCancelarCopia()">Cancelar</button>
  </div>`:"";
  return `<div class="card">
    <div class="flex" style="justify-content:space-between;align-items:center;margin-bottom:10px">
      <h2 style="font-size:15px">🗓️ Mi horario semanal</h2>
      <button class="ghost" style="border:1px solid var(--line)" onclick="horImprimir()">🖨️ Imprimir horario</button>
    </div>
    ${bannerCopia}
    <div class="hor-grid">${cabecera}${filas}</div>
    <p class="sub" style="margin:8px 0 0">Toca el icono 📋 de una casilla rellena para copiarla, y luego toca cualquier otra para pegarla.</p>
  </div>`;
}
window.horImprimir=()=>{
  const filasHtml=HOR_FILAS.map((f,fi)=>{
    const celdas=HOR_DIAS.map(d=>{
      const c=horCelda(fi,d.id);
      if(!c.tipo) return `<td></td>`;
      if(c.tipo==="clase") return `<td><strong>${esc(c.materia||"Clase")}</strong>${c.nivelGrupo?"<br>"+esc(c.nivelGrupo):""}${c.aula?'<br><span style="color:#888">'+esc(c.aula)+"</span>":""}</td>`;
      return `<td><strong>${horTipoInfo(c.tipo).label}</strong>${c.nota?"<br>"+esc(c.nota):""}</td>`;
    }).join("");
    return `<tr><td style="white-space:nowrap;font-size:11px;color:#666">${f.inicio}–${f.fin}</td>${celdas}</tr>`;
  }).join("");
  const body=`
    <h1>Horario semanal</h1>
    <div class="meta">Generado el ${new Date().toLocaleDateString("es-ES")}</div>
    <table>
      <thead><tr><th></th>${HOR_DIAS.map(d=>`<th>${d.label}</th>`).join("")}</tr></thead>
      <tbody>${filasHtml}</tbody>
    </table>
  `;
  abrirVentanaInforme("Horario semanal", body);
};

  if(!last) return `<div class="alert-box">⚠️ <strong>Todavía no has exportado ninguna copia de seguridad.</strong>&nbsp;Todo se guarda solo en este navegador: exporta una copia (arriba a la derecha) para no perder tu trabajo si cambias de equipo o se borra el caché.</div>`;
  const days=Math.floor((Date.now()-last)/86400000);
  if(days>=14) return `<div class="alert-box">⚠️ <strong>Última copia de seguridad: hace ${days} días.</strong>&nbsp;Conviene exportar una copia reciente.</div>`;
  return `<p class="sub" style="margin:-6px 0 4px">Última copia de seguridad: ${haceTiempo(last)}.</p>`;
}

window.cargarArchivoCatalogo=inp=>{
  const file=inp.files[0]; if(!file) return;
  const rd=new FileReader();
  rd.onload=()=>{
    const ta=document.getElementById("catTexto");
    if(ta){ ta.value=String(rd.result); state.ui.catImportTexto=ta.value; save(); }
    inp.value="";
  };
  rd.readAsText(file);
};
window.crearGrupo=()=>{
  const ng=state.ui.nuevoGrupo; if(!ng.nombre.trim()) return;
  const g=defGrupo(ng.nombre.trim(),ng.catalogoKey);
  state.grupos.push(g);
  state.ui.grupoId=g.id; state.ui.tab="alumnos";
  state.ui.nuevoGrupo={nombre:"",catalogoKey:ORDEN_CATALOGOS[0]};
  save(); render();
};

window.exportarTodo=()=>{
  const blob=new Blob([JSON.stringify(state,null,2)],{type:"application/json"});
  const u=URL.createObjectURL(blob); const a=document.createElement("a");
  a.href=u; a.download="copia-evaluacion-"+new Date().toISOString().slice(0,10)+".json"; a.click(); URL.revokeObjectURL(u);
  state.lastBackupAt=Date.now(); state.cambiosSinCopia=0; save(); render();
};
window.importarTodo=inp=>{
  const file=inp.files[0]; if(!file) return; const rd=new FileReader();
  rd.onload=()=>{
    try{
      const s=JSON.parse(rd.result);
      if(!s.grupos) throw new Error("formato");
      if(state.grupos.length>0 && !confirm(`Esto reemplazará los ${state.grupos.length} grupo(s) que ya tienes cargados por los del archivo importado. ¿Continuar?`)){ inp.value=""; return; }
      state=Object.assign(defAppState(),s); if(!state.ui) state.ui=defAppState().ui;
      (state.grupos||[]).forEach(g=>{ normalizarGrupo(g); (g.alumnos||[]).forEach(normalizarAlumno); ordenarAlumnos(g); });
      state.ui.grupoId=null; state.cambiosSinCopia=0; save(); render();
    }catch(e){ alert("El archivo no tiene el formato correcto."); }
  };
  rd.readAsText(file);
};

window.filtrarAlumnos=q=>{
  const norm=normalizarTexto(q||"");

  if(!tabla) return;
  let visibles=0;
  [...tabla.querySelectorAll("tbody tr[data-id]")].forEach(tr=>{
    const match=!norm || tr.dataset.buscar.includes(norm);
    if(match) visibles++;
    tr.style.display = match? "" : "none";
    const next=tr.nextElementSibling;
    if(next && next.dataset.obsfor===tr.dataset.id){ next.style.display = match? "" : "none"; }
  });
  const aviso=document.getElementById("alSinResultados");
  if(aviso) aviso.style.display = (norm && visibles===0)? "" : "none";
};

function addAlumnosNombres(entradas){
  const g=grupoActual();
  const existentes=new Set(g.alumnos.map(a=>normalizarTexto(a.nombre)));
  let anadidos=0, omitidos=0;
  entradas.forEach(linea=>{
    linea=(linea||"").trim(); if(!linea) return;
    const {apellidos,nombreP}=splitApellidosNombre(linea);
    const nombre=nombreCompleto(apellidos,nombreP);
    if(!nombre) return;
    const clave=normalizarTexto(nombre);
    if(existentes.has(clave)){ omitidos++; return; }
    g.alumnos.push(normalizarAlumno({id:uid(),apellidos,nombreP,nombre}));
    existentes.add(clave);
    anadidos++;
  });
  ordenarAlumnos(g);
  save(); render();
  if(anadidos||omitidos) alert(`Añadidos ${anadidos} alumno${anadidos===1?"":"s"}.${omitidos?` Omitidos ${omitidos} por tener ya un nombre muy similar en el grupo.`:""}`);
}
window.addAlumnosBulk=()=>{

};
function splitCSVLine(line,delim){
  const cells=[]; let cur=""; let inQuotes=false;
  for(let i=0;i<line.length;i++){
    const ch=line[i];
    if(inQuotes){
      if(ch==='"'){
        if(line[i+1]==='"'){ cur+='"'; i++; } else { inQuotes=false; }
      } else cur+=ch;
    } else {
      if(ch==='"') inQuotes=true;
      else if(ch===delim){ cells.push(cur); cur=""; }
      else cur+=ch;
    }
  }
  cells.push(cur);
  return cells.map(c=>c.trim().replace(/^["']|["']$/g,""));
}
function parseCSVAlumnos(text){
  const lines=text.split(/\r?\n/).filter(l=>l.trim().length>0);
  if(!lines.length) return [];
  const delim=(lines[0].match(/;/g)||[]).length>=(lines[0].match(/,/g)||[]).length?";":",";
  const primeraCeldas=splitCSVLine(lines[0],delim);
  const primera=(primeraCeldas[0]||"").toLowerCase();
  const cabeceras=["nombre","alumno","alumno/a","nombre completo","name","apellidos, nombre","alumnado","apellidos"];
  const inicio=cabeceras.includes(primera)?1:0;
  const entradas=[];
  for(let i=inicio;i<lines.length;i++){
    const celdas=splitCSVLine(lines[i],delim);
    if(!celdas.length || !celdas[0]) continue;
    let apellidos="",nombreP="";
    if(celdas.length>=2 && celdas[1] && celdas[1].trim()){
      apellidos=celdas[0]; nombreP=celdas[1];
    } else {
      const partes=splitApellidosNombre(celdas[0]);
      apellidos=partes.apellidos; nombreP=partes.nombreP;
    }
    const nombre=nombreCompleto(apellidos,nombreP);
    if(nombre) entradas.push(nombre);
  }
  return entradas;
}
window.importarCSVAlumnos=inp=>{
  const file=inp.files[0]; if(!file) return;
  const rd=new FileReader();
  rd.onload=()=>{
    const buf=rd.result;
    let text;
    try{
      // Intento estricto en UTF-8: si el archivo no es UTF-8 válido (p. ej. viene de
      // Excel en Windows-1252/ISO-8859-1), esto lanza un error y pasamos al catch.
      text=new TextDecoder("utf-8",{fatal:true}).decode(buf);
    }catch(e){
      text=new TextDecoder("windows-1252").decode(buf);
    }
    const entradas=parseCSVAlumnos(text);
    if(!entradas.length){ alert("No se ha encontrado ningún nombre en el archivo."); return; }
    addAlumnosNombres(entradas);
  };
  rd.readAsArrayBuffer(file);
  inp.value="";
};

window.saveActividad=()=>{ const grupo=grupoActual(); const f=state.ui.form;
  if(!f.nombre.trim()||!f.links.length) return;
  const criterios=f.links.map(l=>({critId:l.critId,peso:Number(l.peso)||0}));
  const pesoBloque=(f.pesoBloque===""||f.pesoBloque==null)?"":Number(f.pesoBloque);
  const sdaStr = (f.sda||"").trim();
  if(f.editId){
    const a=grupo.actividades.find(x=>x.id===f.editId);
    if(a){
      a.nombre=f.nombre.trim(); a.tipo=f.tipo; a.bloqueId=f.bloqueId; a.esExamen=f.esExamen; a.criterios=criterios; a.pesoBloque=pesoBloque; a.sda=sdaStr;
      const keep=new Set(criterios.map(l=>l.critId));
      for(const alId in grupo.notas){
        const n=grupo.notas[alId]?.[a.id]; if(!n) continue;
        for(const cid in n) if(!keep.has(cid)) delete n[cid];
      }
    }
  }else{
    grupo.actividades.push({id:uid(),trimestre:state.ui.trim,nombre:f.nombre.trim(),tipo:f.tipo,bloqueId:f.bloqueId,esExamen:f.esExamen,pesoBloque,criterios,sda:sdaStr});

window.delActividad=id=>{ const grupo=grupoActual(); const a=grupo.actividades.find(x=>x.id===id); if(!a) return;
  if(confirm(`¿Eliminar la actividad "${a.nombre}"? Podrás restaurarla desde la papelera de esta pestaña si te equivocas.`)){
    const notas={}; const notasCuant={}; const rubricScores={}; const examComentarios={};
    for(const alId in grupo.notas){ if(grupo.notas[alId]?.[id]) notas[alId]=JSON.parse(JSON.stringify(grupo.notas[alId][id])); }
    for(const alId in grupo.notasCuant){ if(grupo.notasCuant[alId]?.[id]!=null) notasCuant[alId]=grupo.notasCuant[alId][id]; }
    for(const alId in (grupo.rubricScores||{})){ if(grupo.rubricScores[alId]?.[id]) rubricScores[alId]=JSON.parse(JSON.stringify(grupo.rubricScores[alId][id])); }
    for(const alId in (grupo.examComentarios||{})){ if(grupo.examComentarios[alId]?.[id]) examComentarios[alId]=grupo.examComentarios[alId][id]; }
    grupo.papelera.actividades.unshift({actividad:JSON.parse(JSON.stringify(a)),notas,notasCuant,rubricScores,examComentarios,borradoEn:Date.now()});
    if(grupo.papelera.actividades.length>10) grupo.papelera.actividades.length=10;
    grupo.actividades=grupo.actividades.filter(x=>x.id!==id);
    for(const al in grupo.notas) delete grupo.notas[al]?.[id];
    for(const al in grupo.notasCuant) delete grupo.notasCuant[al]?.[id];
    for(const al in (grupo.rubricScores||{})) delete grupo.rubricScores[al]?.[id];
    for(const al in (grupo.examComentarios||{})) delete grupo.examComentarios[al]?.[id];
    if(state.ui.form.editId===id) state.ui.form={editId:null,nombre:"",tipo:TIPOS[0],esExamen:false,bloqueId:"",pesoBloque:"",links:[],sda:""};
    if(state.ui.corExamId===id){ state.ui.corExamId=""; state.ui.corTab="lista"; }
    save(); render();
  } };
window.restaurarActividadPapelera=idx=>{

};

window.massFill = (actId, critId) => {
   let input = prompt(`Nota para los sin calificar en ${critId} (10, 7.5, 5 o 0):`);
   if(input === null || input.trim() === "") return;
   let val = Number(input.replace(',','.'));
   if(isNaN(val) || val < 0 || val > 10) { alert("Valor numérico no válido."); return; }
   if(![10, 7.5, 5, 0].includes(val)) { alert("Atención: el valor introducido no corresponde exactamente a los de la escala cualitativa (10, 7.5, 5 o 0), pero se aplicará como nota personalizada."); }
   const grupo = grupoActual();
   let changed = false;
   grupo.alumnos.forEach(al => {
      if(!grupo.notas[al.id]) grupo.notas[al.id] = {};
      if(!grupo.notas[al.id][actId]) grupo.notas[al.id][actId] = {};
      if(grupo.notas[al.id][actId][critId] == null || grupo.notas[al.id][actId][critId] === "") {
         grupo.notas[al.id][actId][critId] = val;
         changed = true;
      }
   });
   if(changed) { save(); render(); }
};
window.massFillCuantExamen = (actId) => {
   const grupo = grupoActual(); const act = grupo.actividades.find(x=>x.id===actId); if(!act) return;
   let input = prompt(`Nota cuantitativa (0-10) para alumnos sin nota en este examen:`);
   if(input === null || input.trim() === "") return;
   let val = Number(input.replace(',','.'));
   if(isNaN(val) || val < 0 || val > 10) { alert("Valor numérico no válido."); return; }
   let changed = false;
   grupo.alumnos.forEach(al => {
      grupo.notasCuant[al.id] = grupo.notasCuant[al.id] || {};
      const actual = grupo.notasCuant[al.id][actId];
      if(actual == null || actual === "") {
         grupo.notasCuant[al.id][actId] = val;
         changed = true;
      }
   });
   if(changed) { save(); render(); }
};

/* ---------- Resultados ---------- */
function distribucionNotas(grupo,trim){
  const counts={}; NIVCUANT.forEach(n=>counts[n.etq]=0);
  let conNota=0;
  grupo.alumnos.forEach(al=>{
    const v=notaTrimestre(grupo,al.id,trim);
    if(v==null) return;
    conNota++;
    counts[etiquetaNota(v).etq]++;
  });
  return {counts,conNota,total:grupo.alumnos.length};
}
function renderDistribucionHTML(grupo,trim){
  const {counts,conNota,total}=distribucionNotas(grupo,trim);
  if(conNota===0) return '<p style="color:var(--mut);font-size:14px">Todavía no hay notas de este periodo.</p>';
  const max=Math.max(...NIVCUANT.map(n=>counts[n.etq]),1);
  return `<div class="grid" style="gap:8px">
    ${NIVCUANT.map(n=>{
      const cnt=counts[n.etq]||0; const pct=max?(cnt/max*100):0;
      return `<div class="flex" style="gap:10px;align-items:center;flex-wrap:nowrap">

          <div style="width:${pct}%;background:${n.bg};height:100%;border-left:3px solid ${n.fg}"></div>
        </div>
        <span style="width:22px;text-align:right;font-size:13px;font-weight:600;flex-shrink:0">${cnt}</span>
      </div>`;
    }).join("")}
    <p class="sub" style="margin:4px 0 0">${conNota} de ${total} alumno${total===1?"":"s"} con nota en ${TRIMESTRES[trim]}.</p>
  </div>`;
}

/* ---------- Cobertura Curricular ---------- */
function renderCobertura(grupo){
  const c=document.getElementById("tabContent");
  const idx=catIndex(grupo.catalogoKey);

  const actsByCrit = {};
  grupo.actividades.forEach(a => {
     a.criterios.forEach(l => {
        if(!actsByCrit[l.critId]) actsByCrit[l.critId] = [];
        actsByCrit[l.critId].push(a);
     });
  });

  let html = `<div class="card">
    <h2>Cobertura curricular y de evaluación</h2>
    <p class="sub">Listado general de las competencias específicas y criterios de evaluación. Comprueba qué actividades evalúan cada criterio a lo largo del curso para garantizar que se abordan íntegramente. Se marcarán con ⚠️ aquellos que solo se hayan evaluado una vez en todo el curso.</p>
  </div>`;

  idx.cat.ces.forEach(ce => {
     const ceActs = new Set();
     ce.criterios.forEach(cr => {
        (actsByCrit[cr.id] || []).forEach(a => ceActs.add(a.nombre));
     });
     const ceStatus = ceActs.size > 0 ? `<span class="pill" style="background:#dcece0;color:#1e5631">Trabajada</span>` : `<span class="pill" style="background:#f3dcdc;color:#912525">Pendiente</span>`;

     html += `<div class="card" style="padding:0;overflow:hidden;margin-bottom:16px">
        <div style="background:var(--paper);padding:12px 16px;border-bottom:1px solid var(--line);display:flex;justify-content:space-between;align-items:start;gap:12px">
           <div style="font-size:14.5px;font-weight:600">${ce.id} · ${esc(ce.titulo)}</div>
           <div style="flex-shrink:0">${ceStatus}</div>
        </div>
        <div style="padding:12px 16px" class="grid">
     `;

     ce.criterios.forEach((cr, i) => {
        const acts = actsByCrit[cr.id] || [];
        let crStatus = "";
        if (acts.length === 0) crStatus = `<span style="color:var(--danger);font-weight:600;font-size:13px">✗ Pendiente</span>`;
        else if (acts.length === 1) crStatus = `<span style="color:var(--warning);font-weight:600;font-size:13px">⚠️ Eval. 1 sola vez</span>`;
        else crStatus = `<span style="color:var(--accent);font-weight:600;font-size:13px">✓ Evaluado (${acts.length})</span>`;
        
        const borderStyle = i === ce.criterios.length - 1 ? 'border-bottom:none;padding-bottom:0' : 'border-bottom:1px dashed var(--line);padding-bottom:10px';
        
        html += `
           <div style="font-size:13.5px;${borderStyle}">
              <div style="margin-bottom:6px"><strong>${cr.id}</strong> ${esc(cr.texto)}</div>
              <div style="display:flex;gap:12px;align-items:center;flex-wrap:wrap">
                 ${crStatus}
                 ${acts.length > 0 ? `<div style="display:flex;gap:6px;flex-wrap:wrap">${acts.map(a => `<span class="chip" style="padding:3px 8px;font-size:11.5px;background:var(--paper)">${esc(a.nombre)} <span style="opacity:0.6">(${TRIMESTRES[a.trimestre]})</span></span>`).join("")}</div>` : '<span style="color:var(--mut);font-size:12.5px">Ninguna actividad asociada</span>'}
              </div>
           </div>
        `;
     });

     html += `</div></div>`;
  });

  c.innerHTML = html;
}

        <textarea class="in" style="width:100%;margin-top:4px;min-height:120px;resize:vertical" id="diarioNotaInput" placeholder="Ej. Tema 3, apartado 2: causas de la Revolución Industrial. Actividad de comentario de gráficos.">${esc(notaActual)}</textarea>

        <button class="btn" onclick="diarioGuardarEntrada()">Guardar</button>
        ${notaActual?`<button class="ghost danger" onclick="diarioBorrarEntrada()">Eliminar esta entrada</button>`:""}
      </div>
    </div>
  </div>
  <div class="card">
    <div class="flex" style="justify-content:space-between;align-items:center">
      <h2 style="font-size:15px">Historial (${entradas.length} entrada${entradas.length===1?"":"s"})</h2>
      ${entradas.length?`<button class="ghost" style="border:1px solid var(--line)" onclick="diarioImprimir()">🖨️ Imprimir diario</button>`:""}

    </div>
  </div>`;
}
window.diarioSeleccionarFecha=(f)=>{ state.ui.diarioFecha=f; save(); render(); };
window.diarioGuardarEntrada=()=>{
  const grupo=grupoActual();
  const fecha=document.getElementById("diarioFechaInput").value;
  const nota=document.getElementById("diarioNotaInput").value.trim();
  if(!fecha){ alert("Elige una fecha."); return; }
  if(!grupo.diario) grupo.diario={};
  if(nota) grupo.diario[fecha]=nota; else delete grupo.diario[fecha];
  state.ui.diarioFecha=fecha;
  save(); render();
};
window.diarioBorrarEntrada=()=>{
  const grupo=grupoActual();
  const fecha=state.ui.diarioFecha||agHoyStr();
  if(!confirm("¿Eliminar la entrada de este día?")) return;
  if(grupo.diario) delete grupo.diario[fecha];
  save(); render();
};

window.duplicarGrupo=()=>{
  const grupo=grupoActual();
  const nombre=prompt("Nombre para el grupo nuevo:", grupo.nombre+" (copia)");
  if(!nombre||!nombre.trim()) return;
  const nuevo=defGrupo(nombre.trim(),grupo.catalogoKey);
  nuevo.pesos=JSON.parse(JSON.stringify(grupo.pesos));
  nuevo.umbrales={...grupo.umbrales};
  nuevo.pesosTrim={...grupo.pesosTrim};
  nuevo.bloques=grupo.bloques.map(b=>({...b}));
  nuevo.actividades=grupo.actividades.map(a=>{
    const copia={...a,id:uid(),criterios:a.criterios.map(l=>({...l}))};
    if(a.rubrica) copia.rubrica=JSON.parse(JSON.stringify(a.rubrica));
    return copia;
  });
  state.grupos.push(nuevo);
  state.ui.grupoId=nuevo.id; state.ui.tab="alumnos";
  save(); render();
  alert(`Grupo "${nuevo.nombre}" creado con la misma configuración y ${nuevo.actividades.length} actividad${nuevo.actividades.length===1?"":"es"}. Añade ahora su propio alumnado.`);
};
window.exportarGrupo=()=>{
  const grupo=grupoActual();
  const blob=new Blob([JSON.stringify({grupos:[grupo]},null,2)],{type:"application/json"});
  const u=URL.createObjectURL(blob); const a=document.createElement("a");
  a.href=u; a.download="grupo-"+grupo.nombre.replace(/[^a-z0-9]+/gi,"-").toLowerCase()+"-"+new Date().toISOString().slice(0,10)+".json"; a.click(); URL.revokeObjectURL(u);
};
window.borrarGrupoId=id=>{
  const g=state.grupos.find(x=>x.id===id); if(!g) return;
  if(confirm(`¿Eliminar "${g.nombre}" y todos sus datos (alumnado, actividades, notas)? Esta acción no se puede deshacer.`)){
    state.grupos=state.grupos.filter(x=>x.id!==id);
    if(state.ui.grupoId===id){ state.ui.grupoId=null; state.ui.corExamId=""; state.ui.corAlId=""; state.ui.corTab="lista"; }
    if(state.ui.agFiltroGrupo===id) state.ui.agFiltroGrupo="";
    (state.eventos||[]).forEach(e=>{ if(e.grupoId===id) e.grupoId=""; });
    (state.reuniones||[]).forEach(r=>{ if(r.grupoId===id){ r.grupoId=""; r.alumnoId=""; } });
    save(); render();
  }
};
window.borrarGrupo=()=>{ const grupo=grupoActual(); if(grupo) borrarGrupoId(grupo.id); };

window.setPesoTrim=(t,v)=>{ const g=grupoActual(); if(!g.pesosTrim) g.pesosTrim={}; g.pesosTrim[t]=v; save(); };

   const grupo = grupoActual();
   const idx = catIndex(grupo.catalogoKey);
   const trim = state.ui.trim;
   const ccKeys = Object.keys(COMP_CLAVE).filter(cc => idx.cat.ces.some(ce => ce.cc.includes(cc)));
   
   let csv = "Alumno;Nota Trimestre;Nota Final;Escala Final";
   ccKeys.forEach(k => csv += `;${k}`);
   csv += "\n";

   grupo.alumnos.forEach(a => {
      const t = notaTrimestre(grupo, a.id, trim);
      const f = notaFinal(grupo, a.id);
      const etqF = etiquetaNota(f);
      csv += `${a.nombre};${t==null?'':t.toFixed(2).replace('.',',')};${f==null?'':f.toFixed(2).replace('.',',')};${etqF?etqF.etq:''}`;
      ccKeys.forEach(k => {
         const val = scoreCC(grupo, a.id, k);
         const nv = nivel(grupo, val);
         csv += `;${nv?nv.etq:'-'}`;
      });
      csv += "\n";
   });

   const blob = new Blob(["\ufeff" + csv], {type: "text/csv;charset=utf-8;"});
   const u = URL.createObjectURL(blob); 
   const a = document.createElement("a");
   a.href = u; 
   a.download = `notas-${grupo.nombre.replace(/[^a-z0-9]+/gi,"-").toLowerCase()}-trim${trim+1}.csv`; 
   a.click(); 
   URL.revokeObjectURL(u);
};

/* =================================================================
   RESUMEN DEL GRUPO — aprobados/suspensos por evaluación, SdA
   trabajadas vs previstas y propuestas de mejora. Estos datos se
   incorporan también al informe de grupo imprimible.
   ================================================================= */
function resumenAprobados(grupo,trim){
  // trim = 0/1/2 para una evaluación; "final" para la nota final del curso
  let ap=0,su=0,sc=0;
  grupo.alumnos.forEach(al=>{
    const v = trim==="final" ? notaFinal(grupo,al.id) : notaTrimestre(grupo,al.id,trim);
    if(v==null) sc++;
    else if(v>=5) ap++;
    else su++;
  });
  return {ap,su,sc,total:grupo.alumnos.length};
}
function sdasDeTrim(grupo,trim){
  const set=new Set();
  grupo.actividades.filter(a=>a.trimestre===trim && (a.sda||"").trim()).forEach(a=>set.add(a.sda.trim().toLowerCase()));
  return set;
}
function sdasDeCurso(grupo){
  const set=new Set();
  [0,1,2].forEach(t=>sdasDeTrim(grupo,t).forEach(s=>set.add(s)));
  return set;
}
function sdaPrevistasCurso(grupo){
  const vals=(grupo.sdaPrevistas||[]).map(v=>Number(v)).filter(v=>!isNaN(v)&&v>0);
  return vals.length? vals.reduce((a,b)=>a+b,0) : null;
}
function barraAprobadosHTML(r,opts){
  // Barra apilada aprobados/suspensos/sin calificar; funciona en pantalla y en impresión.
  opts=opts||{};
  if(!r.total) return `<p style="color:${opts.print?'#666':'var(--mut)'};font-size:13px;margin:6px 0">Sin alumnado.</p>`;
  const seg=(n,color,label)=> n>0? `<div title="${label}: ${n}" style="flex:${n};background:${color};display:flex;align-items:center;justify-content:center;color:#fff;font-size:11.5px;font-weight:600;min-width:26px;print-color-adjust:exact;-webkit-print-color-adjust:exact">${n}</div>`:"";
  return `
  <div style="display:flex;height:26px;border-radius:7px;overflow:hidden;border:1px solid ${opts.print?'#ccc':'var(--line)'};margin:6px 0 4px">
    ${seg(r.ap,"#2f7d4f","Aprobados")}${seg(r.su,"#b04343","Suspensos")}${seg(r.sc,"#9aa1ab","Sin calificar")}
  </div>
  <div style="font-size:12px;color:${opts.print?'#555':'var(--mut)'}">
    <span style="color:#2f7d4f;font-weight:600">■</span> Aprobados ${r.ap} (${Math.round(r.ap/r.total*100)}%) ·
    <span style="color:#b04343;font-weight:600">■</span> Suspensos ${r.su} (${Math.round(r.su/r.total*100)}%)
    ${r.sc?` · <span style="color:#9aa1ab;font-weight:600">■</span> Sin calificar ${r.sc}`:""}
  </div>`;
}
function sdaResumenTexto(trabajadas,previstas,opts){
  opts=opts||{};
  const prev = (previstas==null||previstas==="")? null : Number(previstas);
  const color = opts.print? '#555' : 'var(--mut)';
  if(prev==null || isNaN(prev) || prev<=0) return `<span style="font-size:13px;color:${color}">SdA trabajadas: <strong>${trabajadas}</strong> (previstas sin indicar)</span>`;
  const pct=Math.min(100,Math.round(trabajadas/prev*100));
  return `<span style="font-size:13px;color:${color}">SdA trabajadas: <strong>${trabajadas} de ${prev}</strong> previstas (${pct}%)</span>`;

/* =================================================================
   CORRECTOR DE EXÁMENES — motor de rúbricas
   Cada examen "esExamen" puede llevar una rúbrica propia (act.rubrica):
   apartados → ítems, cada ítem con una puntuación máxima y, opcionalmente,
   vinculado a uno o varios criterios de evaluación (con peso).
   De la rúbrica se calculan SIEMPRE dos notas independientes que se
   guardan en los mismos campos que ya usa Evaluación por Competencias:
     - Cuantitativa (grupo.notasCuant): suma de puntos de los ítems (0-10).
       Cuenta para la nota numérica del bloque/trimestre.
     - Cualitativa por criterio (grupo.notas): porcentaje logrado en los
       ítems vinculados a ESE criterio, en escala continua 0-10 (a
       diferencia de las demás actividades, que usan 4 niveles fijos).
       Cuenta para las competencias específicas y clave.
   No hay sincronización entre el Corrector y Evaluación por Competencias
   porque no hay dos bases de datos: es el mismo grupo, el mismo alumnado
   y los mismos campos de nota, vistos desde dos pantallas distintas.
   ================================================================= */
function cxItemsFlat(rubrica){
  const out=[]; (rubrica||[]).forEach(sec=>(sec.items||[]).forEach(it=>out.push(it))); return out;
}
function cxMaxTotal(rubrica){ return cxItemsFlat(rubrica).reduce((s,it)=>s+(Number(it.max)||0),0); }
function cxCriteriosDeRubrica(rubrica){
  const set=new Set(); cxItemsFlat(rubrica).forEach(it=>(it.links||[]).forEach(l=>set.add(l.critId))); return [...set];
}
function cxNotaCuant(grupo,alId,actId,rubrica){
  const sc=grupo.rubricScores?.[alId]?.[actId]||{};
  let total=0; cxItemsFlat(rubrica).forEach(it=>{ total+=Number(sc[it.id])||0; });
  return Math.round(total*100)/100;
}
function cxNotaCriterio(grupo,alId,actId,rubrica,critId){
  const sc=grupo.rubricScores?.[alId]?.[actId]||{};
  let sw=0,sv=0;
  cxItemsFlat(rubrica).forEach(it=>{
    const link=(it.links||[]).find(l=>l.critId===critId); if(!link) return;
    const w=Number(link.peso)||0; if(w<=0) return;
    const max=Number(it.max)||0; if(max<=0) return;
    const val=sc[it.id]; if(val==null||val==="") return;
    sw+=w; sv+=(Number(val)/max)*10*w;
  });
  return sw>0? Math.round((sv/sw)*100)/100 : null;
}
function cxSyncCriteriosActividad(act){
  const ids=cxCriteriosDeRubrica(act.rubrica);
  act.criterios=ids.map(cid=>{
    const prev=(act.criterios||[]).find(l=>l.critId===cid);
    return {critId:cid, peso:prev?prev.peso:100};
  });
}
function cxRecalcAlumno(grupo,act,alId){
  const perAct=grupo.rubricScores?.[alId]?.[act.id];
  const tieneAlgo = perAct && Object.keys(perAct).length>0;
  if(!tieneAlgo){
    if(grupo.notasCuant[alId]) delete grupo.notasCuant[alId][act.id];
    if(grupo.notas[alId]) delete grupo.notas[alId][act.id];
    return;
  }
  grupo.notasCuant[alId]=grupo.notasCuant[alId]||{};
  grupo.notasCuant[alId][act.id]=cxNotaCuant(grupo,alId,act.id,act.rubrica);
  grupo.notas[alId]=grupo.notas[alId]||{};
  const destino=grupo.notas[alId][act.id]=grupo.notas[alId][act.id]||{};
  const critIds=cxCriteriosDeRubrica(act.rubrica);
  critIds.forEach(cid=>{
    const v=cxNotaCriterio(grupo,alId,act.id,act.rubrica,cid);
    if(v==null) delete destino[cid]; else destino[cid]=v;
  });
  Object.keys(destino).forEach(cid=>{ if(!critIds.includes(cid)) delete destino[cid]; });
}
function cxRecalcTodosLosAlumnos(grupo,act){ grupo.alumnos.forEach(al=>cxRecalcAlumno(grupo,act,al.id)); }
function cxLimpiarPuntuacionesHuerfanas(grupo,act){
  const validIds=new Set(cxItemsFlat(act.rubrica).map(it=>it.id));
  Object.keys(grupo.rubricScores||{}).forEach(alId=>{
    const perAct=grupo.rubricScores[alId]?.[act.id]; if(!perAct) return;
    Object.keys(perAct).forEach(itemId=>{ if(!validIds.has(itemId)) delete perAct[itemId]; });
  });
  cxSyncCriteriosActividad(act);
  cxRecalcTodosLosAlumnos(grupo,act);
}
function cxFindItem(secId,itemId){
  const grupo=grupoActual(); const act=grupo && grupo.actividades.find(a=>a.id===state.ui.corExamId); if(!act) return null;
  const sec=act.rubrica.find(s=>s.id===secId); if(!sec) return null;
  return sec.items.find(it=>it.id===itemId)||null;
}

function cxCriteriosValidosEnCatalogo(catalogoKey){
  const idx=catIndex(catalogoKey); const set=new Set();
  idx.cat.ces.forEach(ce=>ce.criterios.forEach(c=>set.add(c.id)));

}
window.cxCrearExamen=()=>{
  const grupo=grupoActual(); const f=state.ui.corForm;
  if(!f.nombre.trim()) return;
  if(!f.bloqueId) f.bloqueId=defBloque("Prueba objetiva / examen",grupo.bloques);
  let rubricaInicial=[{id:uid(),title:"Apartado 1",items:[{id:uid(),label:"",max:10,desc:[],links:[]}]}];
  if(f.plantillaId){
    const plantilla=(state.plantillasRubrica||[]).find(p=>p.id===f.plantillaId);
    if(plantilla){
      const validos=cxCriteriosValidosEnCatalogo(grupo.catalogoKey);
      rubricaInicial=JSON.parse(JSON.stringify(plantilla.rubrica)).map(sec=>({
        ...sec, id:uid(),
        items:sec.items.map(it=>({...it, id:uid(), links:(it.links||[]).filter(l=>validos.has(l.critId))}))
      }));
    }
  }
  const act={ id:uid(), trimestre:state.ui.trim, nombre:f.nombre.trim(), tipo:"Prueba objetiva / examen",
    bloqueId:f.bloqueId, esExamen:true, pesoBloque:"", criterios:[], sda:(f.sda||"").trim(),
    rubrica:rubricaInicial };
  grupo.actividades.push(act);
  if((f.fecha||"").trim()){
    if(!Array.isArray(state.eventos)) state.eventos=[];
    state.eventos.push({id:uid(), fecha:f.fecha.trim(), titulo:act.nombre, tipo:"examen", grupoId:grupo.id, notas:"", examId:act.id});
    state.ui.agMes=f.fecha.trim().slice(0,7);
  }
  state.ui.corExamId=act.id; state.ui.corTab="editor"; state.ui.corForm={nombre:"",bloqueId:"",sda:"",fecha:"",plantillaId:""};
  save(); render();
};

window.cxSetPesoBloque=v=>{ const grupo=grupoActual(); const act=grupo.actividades.find(a=>a.id===state.ui.corExamId); if(!act) return;
  act.pesoBloque=(v===""||v==null)?"":Number(v); save(); };
window.cxAddSeccion=()=>{ const grupo=grupoActual(); const act=grupo.actividades.find(a=>a.id===state.ui.corExamId); if(!act) return;
  act.rubrica.push({id:uid(),title:"Nuevo apartado",items:[{id:uid(),label:"",max:0,desc:[],links:[]}]});
  save(); render(); };
window.cxDelSeccion=secId=>{ const grupo=grupoActual(); const act=grupo.actividades.find(a=>a.id===state.ui.corExamId); if(!act) return;
  if(act.rubrica.length<=1){ alert("Debe quedar al menos un apartado. Si quieres vaciarlo, elimina sus ítems o borra el examen entero."); return; }
  if(!confirm("¿Eliminar este apartado y todos sus ítems?")) return;
  act.rubrica=act.rubrica.filter(s=>s.id!==secId);
  cxLimpiarPuntuacionesHuerfanas(grupo,act);
  save(); render(); };
window.cxMoveSeccion=(secId,dir)=>{ const grupo=grupoActual(); const act=grupo.actividades.find(a=>a.id===state.ui.corExamId); if(!act) return;
  const i=act.rubrica.findIndex(s=>s.id===secId); const j=i+dir; if(j<0||j>=act.rubrica.length) return;
  [act.rubrica[i],act.rubrica[j]]=[act.rubrica[j],act.rubrica[i]]; save(); render(); };
window.cxSetSeccionTitle=(secId,v)=>{ const grupo=grupoActual(); const act=grupo.actividades.find(a=>a.id===state.ui.corExamId); if(!act) return;
  const sec=act.rubrica.find(s=>s.id===secId); if(sec){ sec.title=v; save(); } };
window.cxAddItem=secId=>{ const grupo=grupoActual(); const act=grupo.actividades.find(a=>a.id===state.ui.corExamId); if(!act) return;
  const sec=act.rubrica.find(s=>s.id===secId); if(!sec) return;
  sec.items.push({id:uid(),label:"",max:0,desc:[],links:[]}); save(); render(); };
window.cxDelItem=(secId,itemId)=>{ const grupo=grupoActual(); const act=grupo.actividades.find(a=>a.id===state.ui.corExamId); if(!act) return;
  const sec=act.rubrica.find(s=>s.id===secId); if(!sec) return;
  if(sec.items.length<=1){ alert("Debe quedar al menos un ítem en el apartado (o elimina el apartado entero)."); return; }
  sec.items=sec.items.filter(it=>it.id!==itemId);
  cxLimpiarPuntuacionesHuerfanas(grupo,act);
  save(); render(); };
window.cxMoveItem=(secId,itemId,dir)=>{ const grupo=grupoActual(); const act=grupo.actividades.find(a=>a.id===state.ui.corExamId); if(!act) return;
  const sec=act.rubrica.find(s=>s.id===secId); if(!sec) return;
  const i=sec.items.findIndex(it=>it.id===itemId); const j=i+dir; if(j<0||j>=sec.items.length) return;
  [sec.items[i],sec.items[j]]=[sec.items[j],sec.items[i]]; save(); render(); };
window.cxSetItemLabel=(secId,itemId,v)=>{ const it=cxFindItem(secId,itemId); if(it){ it.label=v; save(); } };
window.cxSetItemMax=(secId,itemId,v)=>{
  const grupo=grupoActual(); const act=grupo && grupo.actividades.find(a=>a.id===state.ui.corExamId);
  const it=cxFindItem(secId,itemId); if(!it) return;
  it.max=Math.max(0,Number(v)||0);
  if(act){
    // Si el nuevo máximo queda por debajo de puntuaciones ya guardadas, se reajustan
    // para no generar porcentajes por encima del 100% ni notas cuantitativas infladas.
    Object.keys(grupo.rubricScores||{}).forEach(alId=>{
      const val=grupo.rubricScores[alId]?.[act.id]?.[itemId];
      if(val!=null && Number(val)>it.max) grupo.rubricScores[alId][act.id][itemId]=it.max;
    });
    cxRecalcTodosLosAlumnos(grupo,act);
  }
  save(); render();
};
window.cxSetItemDesc=(secId,itemId,v)=>{ const it=cxFindItem(secId,itemId); if(it){ it.desc=String(v||"").split("\n").map(s=>s.trim()).filter(Boolean); save(); } };
window.cxToggleItemCriterios=itemId=>{ state.ui.corItemAbierto = state.ui.corItemAbierto===itemId? "" : itemId; save(); render(); };
window.cxToggleItemLink=(secId,itemId,critId)=>{
  const grupo=grupoActual(); const act=grupo.actividades.find(a=>a.id===state.ui.corExamId); if(!act) return;
  const it=cxFindItem(secId,itemId); if(!it) return;
  if(!it.links) it.links=[];
  const i=it.links.findIndex(l=>l.critId===critId);
  if(i>=0) it.links.splice(i,1); else it.links.push({critId,peso:100});
  cxSyncCriteriosActividad(act); cxRecalcTodosLosAlumnos(grupo,act);
  save(); render(); };
window.cxSetItemLinkPeso=(itemId,critId,v)=>{
  const grupo=grupoActual(); const act=grupo.actividades.find(a=>a.id===state.ui.corExamId); if(!act) return;
  const it=cxItemsFlat(act.rubrica).find(x=>x.id===itemId); if(!it) return;
  const l=(it.links||[]).find(x=>x.critId===critId); if(l){ l.peso=Number(v)||0; cxRecalcTodosLosAlumnos(grupo,act); save(); } };

        <button class="ghost" style="border:1px solid var(--line)" onclick="cxIrEditor('${act.id}')">✏️ Editar rúbrica</button>
        <button class="ghost" style="border:1px solid var(--line)" onclick="cxExportarCSV('${act.id}')">⬇ CSV</button>

      <div><div style="font-size:12.5px;color:var(--mut)">Aprobados</div><span class="big" style="font-size:24px">${aprob}/${notas.length}</span></div>
    </div>`:""}
  </div>
  <div class="card"><div style="overflow-x:auto"><table>
    <thead><tr><th>Alumno/a</th><th>Nota</th><th>Calificación</th><th></th></tr></thead>
    <tbody>${rows}</tbody>
  </table></div></div>`;
  document.getElementById("cxExamSel").addEventListener("change",e=>{ state.ui.corExamId=e.target.value; save(); render(); });

window.cxSetItemScore=(alId,actId,itemId,v)=>{
  const grupo=grupoActual(); const act=grupo.actividades.find(a=>a.id===actId); if(!act) return;
  const item=cxItemsFlat(act.rubrica).find(it=>it.id===itemId); if(!item) return;
  let val=v===""?null:Number(v);
  if(val!=null){ if(isNaN(val)) val=null; else { if(val<0) val=0; if(val>item.max) val=item.max; } }
  grupo.rubricScores[alId]=grupo.rubricScores[alId]||{};
  grupo.rubricScores[alId][actId]=grupo.rubricScores[alId][actId]||{};
  if(val==null) delete grupo.rubricScores[alId][actId][itemId]; else grupo.rubricScores[alId][actId][itemId]=val;
  cxRecalcAlumno(grupo,act,alId);
  save(); render();
};
window.cxExportarCSV=actId=>{
  const grupo=grupoActual(); const act=grupo.actividades.find(a=>a.id===actId); if(!act) return;
  let csv="Alumno;Nota (0-10);Calificacion\n";
  grupo.alumnos.forEach(al=>{
    const v=grupo.notasCuant?.[al.id]?.[act.id];
    const et=etiquetaNota(v);
    csv+=`${al.nombre};${v==null?'':String(fmt(v))};${et?et.etq:''}\n`;
  });
  const blob=new Blob(["\ufeff"+csv],{type:"text/csv;charset=utf-8;"});
  const u=URL.createObjectURL(blob); const a=document.createElement("a");
  a.href=u; a.download="examen-"+act.nombre.replace(/[^a-z0-9]+/gi,"-").toLowerCase()+".csv"; a.click(); URL.revokeObjectURL(u);
};

/* ---------- Vista de solo-lectura del examen dentro de "Calificar" (Evaluación Competencial) ---------- */
function renderCalificarRubrica(grupo,act,acts){
  const c=document.getElementById("tabContent");
  const critIds=cxCriteriosDeRubrica(act.rubrica);
  const rows=grupo.alumnos.map(al=>{
    const vc=grupo.notasCuant?.[al.id]?.[act.id];
    const crit=critIds.map(cid=>{
      const v=grupo.notas?.[al.id]?.[act.id]?.[cid];
      return `${critLinkHTML(grupo.catalogoKey,cid)} ${v==null?"—":v.toFixed(1)}`;
    }).join(" · ");
    return `<tr><td>${esc(al.nombre)}${neseBadgeHTML(al)}</td><td>${vc==null?"—":fmt(vc)}</td><td style="font-size:12.5px;color:var(--mut)">${crit||"—"}</td></tr>`;
  }).join("");
  c.innerHTML=`<div class="card">
    <h2 style="margin-bottom:12px">Calificar actividad</h2>
    <select class="in" id="calSel" style="margin-bottom:16px;min-width:260px">
      ${acts.map(a=>`<option value="${a.id}" ${a.id===act.id?"selected":""}>${esc(a.nombre)}</option>`).join("")}
    </select>
    <div class="alert-box" style="margin-bottom:14px">🖊️ Este examen se corrige con rúbrica desde el <strong>Corrector de Exámenes</strong>: la nota cuantitativa y la de cada criterio se calculan solas.
      <button class="btn small" onclick="cxAbrirDesdeOtroModo('${act.id}')">Abrir en el Corrector →</button>
    </div>
    <div style="overflow-x:auto"><table><thead><tr><th>Alumno/a</th><th>Nota (0-10)</th><th>Criterios</th></tr></thead><tbody>${rows}</tbody></table></div>
  </div>`;
  document.getElementById("calSel").addEventListener("change",e=>{ state.ui.calAct=e.target.value; save(); render(); });
}

/* =================================================================
   BUSCADOR GLOBAL — alumnado, actividades/exámenes, reuniones y
   eventos de calendario, en toda la aplicación a la vez. Vive fuera
   del árbol de render() habitual: es una capa aparte sobre cualquier
   pantalla, así que no toca state.ui ni se guarda con la copia.
   ================================================================= */
let _buscarModalEl=null;
function buscarCoincide(texto,tokens){
  const t=normalizarTexto(texto);
  return tokens.every(tok=>t.includes(tok));
}
function buscarResultados(q){
  const tokens=normalizarTexto(q).split(/\s+/).filter(Boolean);
  const vacio={alumnos:[],actividades:[],reuniones:[],refuerzo:[],repeticion:[],eventos:[]};
  if(!tokens.length) return vacio;
  const alumnos=[];
  state.grupos.forEach(g=>g.alumnos.forEach(al=>{ if(buscarCoincide(al.nombre,tokens)) alumnos.push({al,g}); }));
  const actividades=[];
  state.grupos.forEach(g=>g.actividades.forEach(a=>{ if(buscarCoincide(a.nombre,tokens)||buscarCoincide(a.sda||"",tokens)) actividades.push({a,g}); }));
  const reuniones=(state.reuniones||[]).filter(r=>buscarCoincide(r.titulo||"",tokens)
    || (r.asistentes||[]).some(x=>buscarCoincide(x.nombre||"",tokens)));
  const refuerzo=(state.planesRefuerzo||[]).filter(p=>{
    const alV=rfAlumno(p);
    return buscarCoincide(p.titulo||"",tokens) || (alV&&buscarCoincide(alV.al.nombre,tokens));
  });
  const repeticion=(state.planesRepeticion||[]).filter(p=>{
    const alV=rpAlumno(p);
    return buscarCoincide(p.cursoRepite||"",tokens) || (alV&&buscarCoincide(alV.al.nombre,tokens)) || buscarCoincide(p.alumnoNombre||"",tokens);
  });
  const eventos=(state.eventos||[]).filter(e=>buscarCoincide(e.titulo||"",tokens));
  return { alumnos:alumnos.slice(0,8), actividades:actividades.slice(0,8), reuniones:reuniones.slice(0,8), refuerzo:refuerzo.slice(0,8), repeticion:repeticion.slice(0,8), eventos:eventos.slice(0,8) };
}
function buscarFilaHTML(titulo,meta,onclick){
  return `<div class="ag-evento" onclick="${onclick}">
    <div class="ag-evento-info"><div class="ag-evento-titulo">${titulo}</div><div class="ag-evento-grupo">${meta}</div></div>
  </div>`;
}
function buscarRenderResultados(q){
  const cont=document.getElementById("buscarResultados"); if(!cont) return;
  if(!q.trim()){ cont.innerHTML='<p class="sub" style="margin:6px 0 0">Escribe para buscar en alumnado, actividades y exámenes, reuniones y eventos del calendario, de todos los grupos a la vez.</p>'; return; }
  const r=buscarResultados(q);
  const total=r.alumnos.length+r.actividades.length+r.reuniones.length+r.refuerzo.length+r.repeticion.length+r.eventos.length;
  if(!total){ cont.innerHTML=`<p class="sub" style="margin:6px 0 0">Sin resultados para "${esc(q)}".</p>`; return; }
  const secc=(titulo,html)=> html? `<div class="section-eyebrow" style="margin-top:12px">${titulo}</div>${html}` : "";
  let html="";
  html+=secc("Alumnado", r.alumnos.map(({al,g})=>buscarFilaHTML(esc(al.nombre)+neseBadgeHTML(al), esc(g.nombre), `buscarIrAlumno('${g.id}','${al.id}')`)).join(""));
  html+=secc("Actividades y exámenes", r.actividades.map(({a,g})=>buscarFilaHTML(esc(a.nombre)+(a.rubrica?" 🖊️":""), `${esc(g.nombre)} · ${TRIMESTRES[a.trimestre]}`, `buscarIrActividad('${g.id}','${a.id}')`)).join(""));
  html+=secc("Reuniones", r.reuniones.map(re=>buscarFilaHTML(esc(re.titulo), `${reTipoInfo(re.tipo).label}${re.fecha?" · "+fmt2(re.fecha):""}`, `buscarIrReunion('${re.id}')`)).join(""));
  html+=secc("Planes de refuerzo", r.refuerzo.map(p=>buscarFilaHTML(esc(p.titulo), `${esc(rfNombre(p))} · ${rfEstadoInfo(p.estado).label}`, `buscarIrRefuerzo('${p.id}')`)).join(""));
  html+=secc("Planes de repetición", r.repeticion.map(p=>buscarFilaHTML(esc(rpNombre(p)), `${rpEstadoInfo(p.estado).label}${p.cursoRepite?" · "+esc(p.cursoRepite):""}`, `buscarIrRepeticion('${p.id}')`)).join(""));
  html+=secc("Calendario", r.eventos.map(e=>buscarFilaHTML(esc(e.titulo), fmt2(e.fecha), `buscarIrEvento('${e.fecha}','${e.id}')`)).join(""));
  cont.innerHTML=html;
}
window.buscarAbrir=()=>{
  if(_buscarModalEl) return;
  const div=document.createElement("div");
  div.className="modal-overlay";
  div.onclick=e=>{ if(e.target===div) buscarCerrar(); };
  div.innerHTML=`
    <div class="modal-box" style="max-width:560px">
      <div class="flex" style="justify-content:space-between;align-items:center">
        <h2 style="font-size:17px">🔍 Buscar</h2>
        <button class="modal-close" onclick="buscarCerrar()">×</button>
      </div>
      <input class="in" id="buscarInput" style="width:100%;margin-top:10px;font-size:15px" placeholder="Alumnado, exámenes, reuniones, eventos…" autocomplete="off">
      <div id="buscarResultados" class="scroll" style="margin-top:4px;max-height:50vh"></div>
    </div>`;
  document.body.appendChild(div);
  _buscarModalEl=div;
  const inp=document.getElementById("buscarInput");
  inp.addEventListener("input",()=>buscarRenderResultados(inp.value));
  buscarRenderResultados("");
  setTimeout(()=>inp.focus(),30);
};
window.buscarCerrar=()=>{ if(_buscarModalEl){ _buscarModalEl.remove(); _buscarModalEl=null; } };
document.addEventListener("keydown",e=>{
  if((e.ctrlKey||e.metaKey) && (e.key==="k"||e.key==="K")){ e.preventDefault(); _buscarModalEl?buscarCerrar():buscarAbrir(); }
  else if(e.key==="Escape" && _buscarModalEl){ buscarCerrar(); }
});
window.buscarIrAlumno=(gid,alId)=>{
  buscarCerrar();
  state.ui.appMode="competencial"; state.ui.grupoId=gid; state.ui.tab="resultados"; state.ui.resAl=alId;
  save(); render();
};
window.buscarIrActividad=(gid,aId)=>{
  buscarCerrar();
  const g=state.grupos.find(x=>x.id===gid); const a=g&&g.actividades.find(x=>x.id===aId);
  if(a && a.rubrica){ cxAbrirDesdeOtroModo(aId); return; }
  state.ui.appMode="competencial"; state.ui.grupoId=gid; state.ui.tab="actividades"; if(a) state.ui.trim=a.trimestre;
  save(); render();
};
window.buscarIrReunion=id=>{ buscarCerrar(); reAbrirDesdeOtroModo(id); };
window.buscarIrEvento=(fecha,id)=>{
  buscarCerrar();
  state.ui.appMode="inicio"; state.ui.agMes=fecha.slice(0,7);
  agAbrirModal(fecha,id);
};
window.buscarIrRefuerzo=id=>{ buscarCerrar(); rfAbrirDesdeOtroModo(id); };
window.buscarIrRepeticion=id=>{ buscarCerrar(); rpAbrirDesdeOtroModo(id); };

/* =================================================================
   Arranque
   ================================================================= */
/* Conservación de scroll: al marcar un criterio, poner una nota, etc., la app
   se re-renderiza entera; sin esto, la página y las listas con scroll interno
   (como la lista de criterios) saltarían arriba con cada clic. Se conserva la
   posición solo cuando la vista es la misma; al navegar a otra pantalla o
   pestaña se empieza arriba, como es natural. */
let _lastViewSig=null;
function render(){
  const sig=[state.ui.appMode,state.ui.grupoId,state.ui.tab,state.ui.trim,
             state.ui.corTab,state.ui.corExamId,state.ui.corAlId,state.ui.calAct,
             state.ui.reTab,state.ui.reId,state.ui.reModalNueva,
             state.ui.rfTab,state.ui.rfId,state.ui.rfModalNueva,
             state.ui.rpTab,state.ui.rpId,state.ui.rpModalNueva,
             state.ui.neTab,state.ui.neId,state.ui.neModalCrear?1:0,state.ui.prepNuevoModal?1:0].join("|");
  const mismaVista = sig===_lastViewSig;
  _lastViewSig=sig;
  const sy = mismaVista? (window.scrollY||0) : 0;
  const innerScrolls = mismaVista? [...document.querySelectorAll(".scroll")].map(el=>el.scrollTop) : [];

  const tabs=document.getElementById("groupTabs"), bar=document.getElementById("backupBar");
  if(state.ui.appMode==="inicio"){
    tabs.style.display="none"; bar.style.display="";
    renderTopBar(); renderHome();
  }else if(state.ui.appMode==="corrector"){
    tabs.style.display=""; bar.style.display="";
    renderCorrectorApp();
  }else if(state.ui.appMode==="reuniones"){
    tabs.style.display="none"; bar.style.display="";
    renderTopBar(); renderReunionesApp();
  }else if(state.ui.appMode==="refuerzo"){
    tabs.style.display="none"; bar.style.display="";
    renderTopBar(); renderRefuerzoApp();
  }else if(state.ui.appMode==="repeticion"){
    tabs.style.display="none"; bar.style.display="";
    renderTopBar(); renderRepeticionApp();
  }else if(state.ui.appMode==="nese"){
    tabs.style.display="none"; bar.style.display="";
    renderTopBar(); renderNeseApp();
  }else{
    tabs.style.display=""; bar.style.display="";
    renderShell();
  }

  window.scrollTo(0,sy);
  if(mismaVista){
    [...document.querySelectorAll(".scroll")].forEach((el,i)=>{ if(innerScrolls[i]!=null) el.scrollTop=innerScrolls[i]; });
  }
}
render();

/* Aviso al cerrar/recargar si hay bastantes cambios desde la última copia
   exportada, o si el guardado en el dispositivo está fallando. Evita perder
   trabajo por un cierre accidental de la pestaña en el iPad. */
window.addEventListener("beforeunload",e=>{
  const cambios=state.cambiosSinCopia||0;
  if(!saveState.ok || cambios>=15){
    e.preventDefault();
    e.returnValue="";
    return "";
  }
});

/* Registro del service worker: permite abrir la app sin conexión una vez
   cargada (clave si se usa como app desde la pantalla de inicio del iPad).
   Si el archivo no está presente (p. ej. abriendo el HTML suelto), falla en
   silencio y la app sigue funcionando igual. */
if("serviceWorker" in navigator){
  window.addEventListener("load",()=>{
    navigator.serviceWorker.register("sw.js").catch(()=>{});
  });
}
